                    {
                        title: "Understanding roof anatomy", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>You cannot diagnose or repair a roof without understanding its components. Every roofing problem connects to one or more of these layers failing in a predictable way.</p>
<table class="dtable">
<thead><tr><th>Component</th><th>Function</th><th>Common failure</th></tr></thead>
<tbody>
<tr><td>Shingles (field)</td><td>Primary weather surface</td><td>Cracking, curling, missing granules, impact damage</td></tr>
<tr><td>Ridge cap shingles</td><td>Seal the ridge (highest point)</td><td>Wind lift, cracking — first to fail on an aging roof</td></tr>
<tr><td>Flashing (step, counter, valley)</td><td>Waterproof transitions — roof-to-wall, roof-to-chimney, valley intersections</td><td>Rust, sealant failure, improper installation — responsible for 80–90% of roof leaks</td></tr>
<tr><td>Underlayment (felt or synthetic)</td><td>Secondary water barrier under shingles</td><td>Tears at fasteners, degrades over time</td></tr>
<tr><td>Decking (OSB or plywood)</td><td>Structural substrate</td><td>Rot from prolonged moisture, delamination</td></tr>
<tr><td>Fascia and soffit</td><td>Close the eave — fascia is vertical, soffit is horizontal underside</td><td>Rot from gutter overflow; pest entry</td></tr>
<tr><td>Ice and water shield</td><td>Self-adhering membrane at eaves and valleys</td><td>Missing entirely on older roofs — creates ice dam vulnerability</td></tr>
</tbody>
</table>`},
                    {
                        title: "Finding roof leaks — the systematic approach", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>Water follows gravity and travels along framing before dripping. The stain on the ceiling is rarely directly below the entry point.</p>
<div class="callout callout-diag"><div class="callout-label">The rule of water travel</div><p>Mark the ceiling stain, then go into the attic. Look for the highest point of moisture on the framing — water enters the roof system at the highest wet point and runs down. The leak source is uphill from where you find moisture.</p></div>
<div class="steps">
<div class="step">Go into the attic in daylight without a torch. Look for pinhole daylight through the roof deck. Also look for dark staining on the sheathing — this indicates chronic slow leakage.</div>
<div class="step">Check flashings first — step flashing at dormers, counter flashing at chimneys, valley flashing. Flashing failures cause 80–90% of all roof leaks. A shingle failure causing a leak is less common than people assume.</div>
<div class="step">Check all roof penetrations: vent pipes, exhaust fans, skylights, satellite mounts. Every fastener through a roof is a potential entry point.</div>
<div class="step">If you can't find the source: use a hose systematically. Start at the lowest part of the roof, have a helper inside. Move the water source progressively upward in 5-minute stages — when the leak appears inside, you're near the source.</div>
<div class="step">Leaks only in driving rain from one direction: wind-driven rain enters at low-pitch roof-wall intersections, gable end gaps, or ridge vents. Different investigation than a straight-down rain leak.</div>
</div>`},
                    {
                        title: "Flashing failures — the primary cause of leaks", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>In 30 years on roofs, 80% of residential leaks come from failed or improperly installed flashing — not failed shingles. Understanding flashing is the most valuable roofing skill a handyman can develop.</p>
<div class="steps">
<div class="step">Step flashing (dormers, additions, skylights): individual L-shaped pieces that interleave with each shingle course. Each piece should be 8" wide and 10" long. Failure usually means it was caulked rather than properly lapped, or it has rusted through.</div>
<div class="step">Counter flashing (chimneys): embeds into the mortar joint and laps over the step flashing below. Most common failure is the mortar joint caulk drying out. Re-rake the joint 1" deep, press new counter flashing in, seal with polyurethane caulk.</div>
<div class="step">Pipe boots (rubber flashing around vent pipes): the rubber collar cracks from UV after 10–15 years. Replacement: slide new boot over pipe, nail the base, seal with urethane caulk under surrounding shingles. This fix resolves a large percentage of single-source leaks.</div>
<div class="step">Caulked vs. lapped flashing: any flashing that relies on caulk to be waterproof is wrong. Caulk is a maintenance item — it lasts 5–10 years. Correctly lapped metal flashing relies on water physics (water runs down, not up) and lasts as long as the roof.</div>
<div class="step">Aluminium against masonry: aluminium reacts with lime and corrodes rapidly. Use galvanised steel against concrete or brick — aluminium only in non-contact applications.</div>
</div>`},
                    {
                        title: "Missing and damaged shingles", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>A missing shingle is a visible emergency — exposed underlayment lasts days to weeks before moisture penetrates. Both missing and cracked shingles are handyman repairs if limited to a few.</p>
<div class="callout callout-warn"><div class="callout-label">Safety first</div><p>Never get on a roof wet or with frost. Never walk a steep slope (over 6:12 pitch) without fall protection. Use roof jacks (brackets) on any pitch you feel uncomfortable on — they're inexpensive, rent easily, and prevent the most serious handyman injuries.</p></div>
<div class="steps">
<div class="step">Replacing a missing shingle: slide a flat bar under the course above to expose the nails in the missing shingle's row. Remove any remaining nail stubs. Slide the new shingle in, nail at the nail line, seal nail heads with roofing cement.</div>
<div class="step">Cracked but in place: apply roofing cement under each crack and press flat. Apply cement over the crack. This is temporary — a cracked shingle re-opens within a year or two.</div>
<div class="step">Matching shingles: take a sample to the supplier. Architectural shingles vary by batch and age — an exact colour match 10 years later is unlikely. Consider replacing a full slope if aesthetics matter.</div>
<div class="step">Nailing: nail zone is marked on the shingle face, typically 1" above the cutout. Too high = shingle isn't secure. Too low = nail in the exposure area, will rust and leak.</div>
<div class="step">Cold weather: asphalt shingles become brittle below 50°F. Warm the shingles with a heat gun before lifting — they crack easily when cold.</div>
</div>`},
                    {
                        title: "Ridge cap repair and replacement", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Ridge cap shingles are the most exposed part of the roof — maximum wind load and UV exposure. They fail before field shingles on every roof. Ridge cap replacement is the most common single-area repair call I get.</p>
<div class="steps">
<div class="step">Assess from the ground with binoculars before climbing. Lifted, cracked, or missing ridge caps are clearly visible. Count affected sections to estimate materials.</div>
<div class="step">Remove old caps: loosen the nails with a flat bar. Work from one end toward the other so you don't step on caps you've already removed.</div>
<div class="step">Install new ridge caps: use purpose-made ridge cap shingles, not cut-down 3-tab. Nail at both sides, 5–6" from each end. Each cap overlaps the previous by at least 5".</div>
<div class="step">Final cap at the hip or end: must be hand-sealed — it can't be nailed through without exposed nail heads. Apply roofing cement to the underside and press down firmly. Seal all exposed nail heads.</div>
<div class="step">Hip ridges: start at the bottom, work up. Each cap laps the one below. The very top cap is sealed rather than nailed.</div>
</div>`},
                    {
                        title: "Valley repair", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Roof valleys carry the highest concentration of water on a roof — all runoff from two slopes merges here. Valley failures cause significant damage quickly.</p>
<div class="callout callout-diag"><div class="callout-label">Three valley types</div><p>Open metal valley: visible metal flashing, shingles don't cross. Closed-cut: shingles from one side cross and are cut straight. Woven: shingles from both sides alternate across. Leaks in each type have different causes and different fixes.</p></div>
<div class="steps">
<div class="step">Open valley leak: metal rusted through or shingle edges at valley have lifted. Small rust spot: wire brush, fibreglass mesh reinforcement, elastomeric roof sealant. Widespread rust: replace the valley metal entirely.</div>
<div class="step">Closed-cut valley leak: the cut edge has lifted or shingles cracked at the valley line (common in cold climates). Seal with roofing cement. Recurring: expose the valley and install ice-and-water shield.</div>
<div class="step">Valley metal replacement: use 28-gauge galvanised steel minimum, 24" wide. Install with no exposed fasteners — nail at outer edges only. Overlap sections by 12" with sealant between layers. Never use aluminium in valleys — too soft, punctures easily.</div>
</div>`},
                    {
                        title: "Flat roof blisters and seams", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Flat roofs use completely different materials from pitched roofs. The most common residential systems are modified bitumen (torch-down), EPDM (rubber), and built-up roofing (tar and gravel).</p>
<table class="dtable">
<thead><tr><th>Problem</th><th>System</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Blistering (bubbles)</td><td>Modified bitumen or BUR</td><td>Small, uncracked blisters: leave them — cosmetic only. Cracked blisters: cut an X, press flaps flat, seal with fibreglass mesh + roof cement + granules.</td></tr>
<tr><td>Lifted seam</td><td>Modified bitumen</td><td>Inject roof cement under the seam, press flat, roll with a seam roller. Apply a reinforcing fabric strip over the seam sealed with roof cement.</td></tr>
<tr><td>Puncture or tear</td><td>EPDM rubber</td><td>Clean with EPDM primer. Apply factory-made EPDM repair patch with EPDM bonding adhesive. Do NOT use roof cement or asphalt products on EPDM — incompatible.</td></tr>
<tr><td>Ponding water (standing 48+ hours)</td><td>Any flat system</td><td>Ponding accelerates every failure. Add a drain or raise the low spot with tapered insulation. This is a design problem, not a material problem.</td></tr>
</tbody>
</table>`},
                    {
                        title: "Gutter cleaning and repair", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Gutters are the most neglected part of the roof system and the most consequential when they fail. Overflowing gutters cause fascia rot, soffit rot, foundation water intrusion — from a problem that takes 30 minutes twice a year to prevent.</p>
<div class="steps">
<div class="step">Clean at minimum twice yearly: after autumn leaf fall and after spring pollen season. In areas with overhanging trees, quarterly is better. A blocked gutter can overflow for months without any visible sign from the ground.</div>
<div class="step">Flush after cleaning: run a hose from the far end toward the downspout. Water should flow freely and exit the downspout bottom without backing up. Slow drainage = downspout blockage. Snake it from the top or flush from below at full pressure.</div>
<div class="step">Check pitch while cleaning: use a string line. Gutters slope 1/4" per 10 feet toward the downspout. A sag means a hanger failed — add a screw-in hanger at the sag (24" max spacing throughout).</div>
<div class="step">Gutter leaks at joints: clean and dry the joint thoroughly. Apply gutter sealant from inside. The upper section always inserts into the lower — water going the wrong direction through a joint leaks regardless of sealant.</div>
<div class="step">Holes in aluminium gutters: clean to bare metal, apply fibreglass mesh reinforcement, seal with gutter sealant over and under the mesh. Direct-seal for holes under 1/4".</div>
</div>`},
                    {
                        title: "Fascia and soffit rot", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>Fascia and soffit rot is almost always caused by gutter overflow. Fix the gutters first or the repair fails within 3 years — the rot is a lagging indicator of a drainage problem that has been running for months.</p>
<div class="steps">
<div class="step">Probe before pricing: use an awl at 6" intervals along the affected run. Rot extends behind the gutter where you can't see it, and often into the rafter tails behind. The visible damage is rarely the full extent.</div>
<div class="step">Remove the gutters first. You cannot properly inspect or replace fascia with gutters in place. Label sections and hanger locations for reinstallation.</div>
<div class="step">Fascia replacement: pry the old board off carefully — the drip edge (metal flashing at the roof edge) is nailed through the fascia and must be reinstalled correctly. Use pre-primed PVC fascia trim where possible — impervious to moisture, eliminates future rot.</div>
<div class="step">Soffit replacement: measure the cavity carefully — the channel at each end must support the panel. Install new soffit with adequate ventilation: 1 sq ft net free area per 150 sq ft of attic floor.</div>
<div class="step">After repair: prime all cut wood ends with oil-based primer before installing. Bare end grain against a gutter system is rot waiting to happen.</div>
</div>`},
                    {
                        title: "Roof vent blockages and attic ventilation", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Attic ventilation is one of the most misunderstood roofing topics. Both too little and too much cause problems. The goal is balanced intake at the soffits and exhaust at the ridge.</p>
<div class="callout callout-info"><div class="callout-label">The 1-to-150 rule</div><p>One square foot of net free ventilation area per 150 sq ft of attic floor — split evenly between low intake (soffit vents) and high exhaust (ridge vent or high gable vents). An all-exhaust, no-intake system actually draws conditioned air from the living space. Fix the intake first.</p></div>
<div class="steps">
<div class="step">Blocked soffit vents: most common ventilation problem. Insulation installed from inside covers soffit vent baffles. Install foam baffles (rafter chutes) at every rafter bay at the eave — maintains the air channel regardless of insulation depth.</div>
<div class="step">Ridge vent blockage: check for wasp nests, debris, or snow cap. Clear from inside the attic with a stiff brush.</div>
<div class="step">Turbine vents that don't spin: seized bearing from a wasp nest. Remove the cap, clear the interior, oil the bearing with penetrating lubricant.</div>
<div class="step">Signs of poor ventilation: frost on roof deck underside in winter, black mould on rafters, excessive heat in summer, or shingles aging prematurely on the south slope.</div>
<div class="step">Never mix ridge vents with high gable vents on the same roof — both are exhaust vents. Wind forces one to become an intake for the other, short-circuiting airflow and leaving the lower attic unventilated.</div>
</div>`},
                    {
                        title: "Skylight leaks", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Most skylight leaks are flashing failures, not skylight failures. Before replacing an expensive unit, diagnose the actual failure point.</p>
<div class="steps">
<div class="step">Water running down the inside of the frame (not the glass): flashing failure. Water is entering around the curb and tracking inside. This is a roof repair, not a skylight replacement.</div>
<div class="step">Fogged or wet between panes: failed seal in the double-pane unit. The skylight itself needs replacement, but the roof flashing is fine.</div>
<div class="step">Re-caulking the curb: clean existing sealant thoroughly, apply fresh urethane caulk (not silicone — silicone can't be painted over and deteriorates in UV). Buys 5–10 years before full flashing replacement is needed.</div>
<div class="step">Full skylight flashing replacement: remove surrounding shingles, remove curb flashing, install ice-and-water shield to full perimeter 6" beyond the curb, install new step flashing interleaved with new shingles, counter flashing at the uphill side.</div>
<div class="step">Flat polycarbonate dome skylights: the rubber gasket between the dome and the curb frame deteriorates. Replace the gasket first before assuming anything else is wrong.</div>
</div>`},
                    {
                        title: "Moss, algae, and lichen on roofs", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Moss, algae, and lichen hold moisture against the shingle surface and accelerate deterioration. But aggressive removal causes as much damage as leaving them. The approach must match the growth type and shingle condition.</p>
<table class="dtable">
<thead><tr><th>Growth type</th><th>Identification</th><th>Treatment</th></tr></thead>
<tbody>
<tr><td>Algae (black streaking)</td><td>Black or dark brown streaks, most common on north slopes</td><td>Apply zinc sulphate or sodium hypochlorite solution (1:3 bleach:water). Wet roof, apply, sit 20 min, rinse gently. Never pressure-wash asphalt shingles.</td></tr>
<tr><td>Moss (green carpet)</td><td>Soft green growth, especially in shade</td><td>Apply commercial moss killer (potassium soap of fatty acids or zinc sulphate). Let it die and wash off in rain — do not scrape living moss, the rhizoids damage the granule layer.</td></tr>
<tr><td>Lichen (grey-green crust)</td><td>Hard, circular, crusty growth bonded to the shingle</td><td>Most difficult to remove. Apply moss killer, wait 6 months for it to die, then gently brush. Lichen leaves permanent scarring — heavily lichened shingles are at end of life.</td></tr>
</tbody>
</table>
<div class="callout callout-info"><div class="callout-label">Prevention</div><p>Install zinc or copper strips at the ridge — rainwater picks up trace amounts of metal and runs down, inhibiting biological growth for 15–20 feet below the strip. The only passive long-term solution.</p></div>`},
                    {
                        title: "Ice dams — cause, prevention, and repair", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>An ice dam forms when heat escaping through the roof melts snow, which refreezes at the cold eave overhang. It's a building science problem — fixing just the roof doesn't fix ice dams.</p>
<div class="callout callout-diag"><div class="callout-label">Root cause</div><p>Ice dams form where attic insulation or ventilation is insufficient — warm attic air melts the roof deck above it. Houses without ice dams in the same storm have adequate insulation (R-49+) and balanced ventilation that keeps the roof deck uniformly cold.</p></div>
<div class="steps">
<div class="step">Emergency treatment: use a roof rake to remove snow from the eave from the ground. Do not chip at ice with a pick — you'll destroy the shingles. Create a channel through the dam with calcium chloride ice melt in a nylon stocking laid across it.</div>
<div class="step">Immediate interior protection: if water is running inside, place sheet metal flashing under the shingles at the entry point as a temporary measure while the weather improves.</div>
<div class="step">After the dam clears: inspect shingles at the eave for cracking, lifted tabs, and torn underlayment. At next reroofing, install ice-and-water shield extending 24" past the interior wall line.</div>
<div class="step">Permanent fix — attic insulation: increase to R-49 minimum. Seal all air penetrations from the living space into the attic (top plates, electrical boxes, plumbing stacks) — air leakage contributes as much heat to the roof deck as conductive loss through insulation.</div>
<div class="step">Permanent fix — ventilation: ensure soffit vents are clear and provide adequate intake. Cold, well-ventilated attic + good air sealing + proper insulation = no ice dams in all but extreme climates.</div>
</div>`},
                    {
                        title: "When to refer to a roofer", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>One of the most valuable things a handyman can do is know their scope. On roofing, the line between handyman and roofing contractor is well defined.</p>
<div class="callout callout-diag"><div class="callout-label">Handyman scope on roofing</div><p>Replacing up to 10–12 shingles, re-sealing pipe boots and flashing, cleaning gutters, minor fascia and soffit repairs on accessible roofs, moss treatment, ridge cap replacement on safe pitches, skylight re-caulking, and providing precise leak diagnosis for roofing contractor referrals.</p></div>
<div class="callout callout-warn"><div class="callout-label">Refer to a licensed roofer when</div><p>The roof needs more than 10–15 shingles replaced (signals systemic aging), the decking is damaged, the pitch is over 6:12 without fall protection, the job involves structural ridge reconstruction, the homeowner's insurance is involved (claim work typically requires a licensed contractor), or you find multiple layers of roofing requiring tear-off.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>A precise diagnosis report from you — location, likely cause, scope of work needed — is worth real money to a roofer. It shortens their assessment and positions you as the expert who identified the problem</li>
<li><i class="fa-solid fa-check ci-green"></i>Build a relationship with one or two quality roofing contractors — you refer them roofing work, they refer you handyman work. One of the most productive referral relationships in the trades</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Document your repair scope and exclusions in writing for every roofing job — roof leaks after a handyman repair are common warranty claims</li>
</ul>`}
                ]
            }
        ];

    </div>
    <div class="lessons">
      ${mod.lessons.map((l, li) => `
        <div class="lcard" id="lc-${mod.id}-${li}">
          <div class="lhead" onclick="toggleL('lc-${mod.id}-${li}')" role="button" tabindex="0" aria-expanded="false">
            <div class="lnum">${li + 1}</div>
            <div class="ltitle-wrap">
              <span class="ltitle">${l.title}</span>
              ${(l.badges || []).map(b => `<span class="badge ${b.c}">${b.t}</span>`).join('')}
            </div>
            <span class="ldur"><i class="fa-regular fa-clock" aria-hidden="true"></i> ${l.dur}</span>
            <i class="fa-solid fa-chevron-down lchev" aria-hidden="true"></i>
          </div>
          <div class="lbody" id="lb-${mod.id}-${li}">${l.body}</div>
        </div>
      `).join('')}
    </div>
    <div class="mod-footer">
      <span class="prog-label">${mod.lessons.length} lessons &middot; module ${mi + 1} of ${data.length}</span>
      ${next
                    ? `<button class="next-btn" onclick="goMod('${next.id}')">Next: ${next.label} <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></button>`
                    : `<button class="next-btn" onclick="alert('Course complete! ' + data.reduce((a,m)=>a+m.lessons.length,0) + ' lessons done. Consider building on your skills with a trade-specific certification.')">Course complete ✓</button>`
                }
    </div>
  `;
            mods.appendChild(div);
        });

        function toggleL(id) {
            const card = document.getElementById(id);
            const isOpen = card.classList.toggle('open');
            card.querySelector('.lhead').setAttribute('aria-expanded', isOpen);
        }

        function goMod(id) {
            data.forEach((m, i) => {
                document.querySelectorAll('.nav-btn')[i].classList.toggle('active', m.id === id);
            });
            document.querySelectorAll('.module').forEach(m => {
                m.classList.toggle('active', m.id === 'mod-' + id);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                const el = e.target;
                if (el.classList.contains('lhead')) {
                    e.preventDefault();
                    const card = el.closest('.lcard');
                    if (card) toggleL(card.id);
                }
            }
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => { });
            });
        }
    </script>
</body>

</html>

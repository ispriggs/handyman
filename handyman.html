<div class="callout callout-warn"><div class="callout-label">For tile floors</div><p>Ceramic or porcelain tile requires deflection no greater than L/360 (span in inches ÷ 360). A 12-foot span must deflect less than 0.4". If tile is cracking, the subfloor movement is the cause — adding backer board won't fix a floor that moves.</p></div>`},
                    {
                        title: "Rot assessment and repair", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>Surface rot looks worse than it is. Deep structural rot looks fine on the surface. The probe test is the only reliable assessment.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Use a stiff awl: probe 1" deep. Firm resistance = sound wood. Blade sinks easily = rot. Spongy, crumbly = active decay</li>
<li><i class="fa-solid fa-check ci-green"></i>Surface rot on non-structural trim (under 25% cross-section): excavate all soft material, apply penetrating consolidant, fill with two-part epoxy filler — properly done, this outlasts wood replacement</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Structural members (sill plates, rim joists, posts, beams): if rot exceeds 25% of cross-section or runs full depth, replacement is the only correct call</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Find and eliminate the moisture source before any repair — without fixing the cause, you'll be doing the same job in 3 years</li>
</ul>
<div class="callout callout-warn"><div class="callout-label">Sill plates</div><p>Sill plate rot is common and almost always hidden behind drywall. If baseboard paint is bubbling or drywall feels soft at the bottom corner, probe the sill plate from the crawlspace. It's a common entry point for carpenter ants and termites too.</p></div>`},
                    {
                        title: "Load-bearing wall identification", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>The most dangerous carpentry mistake is cutting into a load-bearing wall thinking it's a partition. Here's how to read the structure before the saw comes out.</p>
<div class="steps">
<div class="step">Walls parallel to floor joists are almost always partitions. Walls perpendicular to joists are candidates for bearing walls.</div>
<div class="step">Go to the basement or crawlspace. A bearing wall almost always has a beam, doubled joist, or foundation wall beneath it.</div>
<div class="step">Check above: a wall under a ridge beam, under another wall above, or under a concentrated load (post, column) is bearing.</div>
<div class="step">With engineered trusses: most interior walls are non-bearing — but never assume. Trusses transfer loads differently than stick framing.</div>
<div class="step">When in doubt: a one-hour structural engineer consultation costs $200–400 and is worth every dollar before opening a wall. Frame it as part of the project cost to the client.</div>
</div>`},
                    {
                        title: "Cabinet door alignment and adjustment", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Modern European cup hinges are adjustable in three axes. Almost every cabinet door alignment problem is solved without removing the door — just a screwdriver.</p>
<div class="callout callout-info"><div class="callout-label">Three adjustments on every European hinge</div><p>In-out: the large screw nearest the cup moves the door closer to or further from the frame. Side-to-side: the mounting plate screw moves the door left or right. Up-down: loosen the mounting plate slotted screws, slide, retighten.</p></div>
<div class="steps">
<div class="step">Door not flush with adjacent doors: adjust the in-out screw (large screw at cup end). Clockwise brings door closer to the frame.</div>
<div class="step">Door too high or low: loosen both mounting plate screws, slide up or down, retighten. Do both hinges together for even movement.</div>
<div class="step">Door pulls left or right: adjust the side screw on both hinges in the same direction and by equal amounts.</div>
<div class="step">Won't stay closed: adjust the magnetic catch position rather than fighting the hinge — the catch is independently adjustable.</div>
<div class="step">Soft-close slamming: the damper is worn. Replacement soft-close dampers ($2 each) clip onto existing hinges — no need to replace the whole hinge.</div>
</div>`},
                    {
                        title: "Drawer problems — won't close, falls out, binds", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>Drawer problems split into two categories: modern undermount/side-mount slide failures, and wood-on-wood binding in older cabinets. Each has a completely different fix.</p>
<table class="dtable">
<thead><tr><th>Symptom</th><th>Type</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Won't close fully, springs back</td><td>Modern undermount slide</td><td>Adjust the soft-close screw on the mechanism. Check for debris on the track.</td></tr>
<tr><td>Falls out when pulled</td><td>Side-mount slide</td><td>The rear stop clip has broken. Replace it — $1 part that clips into the slide track.</td></tr>
<tr><td>Stiff, hard to open</td><td>Wood-on-wood (older cabinet)</td><td>Sand drawer side rails lightly with 120-grit. Apply paste wax or dry PTFE spray — not WD-40, which attracts dust.</td></tr>
<tr><td>Face is crooked</td><td>Modern undermount slide</td><td>Side-adjust screw behind the face panel — loosen, adjust, retighten.</td></tr>
</tbody>
</table>`},
                    {
                        title: "Deck board replacement", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>Replacing deck boards is straightforward — the harder part is assessing how many need replacing, whether the framing beneath is sound, and whether replacements will match weathered existing boards.</p>
<div class="steps">
<div class="step">Probe every board systematically with an awl, especially at ends where water pools on fasteners. Any board that takes the awl more than 1/4" easily needs replacing.</div>
<div class="step">Inspect joist tops while boards are up — probe at every fastener location. Joist rot at fastener points is common and only discovered when boards come off.</div>
<div class="step">Remove old boards: an oscillating tool cuts fasteners flush for screwed boards. For nailed boards, a pry bar under the board with a scrap wood fulcrum lifts them without splitting.</div>
<div class="step">New boards: same species and thickness. Let acclimatise on-site 48 hours. Space with 1/8" gap (a 16d nail as spacer) for drainage and movement.</div>
<div class="step">Colour matching: new pressure-treated lumber weathers grey over 6–12 months. Spot-staining new boards never matches. Apply deck stain to the entire deck after replacement if aesthetics matter.</div>
<div class="step">Fastening: use stainless or hot-dip galvanised screws. Standard screws rust and stain the deck brown within a year. Pre-drill near board ends to prevent splitting.</div>
</div>`},
                    {
                        title: "Fence post repair and replacement", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "45 min",
                        body: `<p>Fence posts fail at ground level — where wood transitions from wet to dry repeatedly. The post above ground can look perfect while the base is completely rotten.</p>
<div class="callout callout-diag"><div class="callout-label">Diagnose before digging</div><p>Push the post at the top with moderate force. Moves and springs back = surface lean, can be braced. Moves and stays = base has failed. Snaps at ground level = post is gone, needs full replacement.</p></div>
<div class="steps">
<div class="step">Leaning post with sound base: dig out one side, plumb with a level, pack gravel and concrete on the excavated side. Brace diagonally for 48 hours while concrete cures.</div>
<div class="step">Failed post base: excavate around the post. If set in concrete, use a post puller or dig out the concrete entirely — trying to burn or rot it out wastes hours.</div>
<div class="step">Partially rotted post (sound above, failed below): use a post repair spike (AKA Metpost). Drive the spike beside the old post stub, bolt to it — no concrete needed.</div>
<div class="step">New post: use fast-set concrete (Quikrete Fast-Setting) poured dry into the hole, add water, no mixing. Sets in 20–40 minutes and is genuinely superior to wet-mixed for posts.</div>
<div class="step">Depth rule: 1/3 of total post length in ground minimum. A 6-foot fence needs an 8-foot post with at least 24" in ground — 30" in frost-prone areas.</div>
</div>`},
                    {
                        title: "Windows that won't open, close, or lock", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Window problems follow the same root causes as door problems: paint buildup, swelling from moisture, and hardware failure. The fix depends on whether it's double-hung, casement, or slider.</p>
<table class="dtable">
<thead><tr><th>Problem</th><th>Type</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Won't open — stuck shut</td><td>Double-hung (painted shut)</td><td>Score paint at sash with a utility knife. Tap a putty knife around the perimeter to break the seal. Never pry from the sash.</td></tr>
<tr><td>Won't stay open</td><td>Double-hung</td><td>Broken sash balance. Replace the balance (available by window brand). Takes 20 minutes.</td></tr>
<tr><td>Won't close fully</td><td>Casement</td><td>Lubricate the operator crank. If still binding, replace the operator — bolted to the frame.</td></tr>
<tr><td>Lock won't engage</td><td>Any type</td><td>Sash misaligned with frame. Adjust the strike plate position — usually adjustable 2–3mm without moving hardware.</td></tr>
<tr><td>Slider stiff to move</td><td>Horizontal slider</td><td>Clean track with brush, vacuum debris, apply silicone spray. Never WD-40 on window tracks — gums up.</td></tr>
</tbody>
</table>`},
                    {
                        title: "Baseboard and trim gaps", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>Gaps in baseboard are almost always wood movement — the trim shrank seasonally or the walls moved slightly. They come back if you just caulk without understanding why they opened.</p>
<div class="steps">
<div class="step">Assess: is the gap at the mitre joint (corner), at the wall-trim joint (top edge), or at the floor (bottom edge)? Each needs a different approach.</div>
<div class="step">Mitre joint gaps: under 1/16", colour-matched caulk and paint. Wider: recut the mitre or switch to a coped joint — a cope overlaps and won't gap as wood moves.</div>
<div class="step">Top edge gap at wall: the wall is not plumb or the trim is not straight. A bead of paintable caulk is the correct finish — this is standard practice on every professional paint job.</div>
<div class="step">Bottom edge gap at floor: floor is not level. Scribe the baseboard to the floor — run a compass along the floor, pencil on the trim face, cut the scribed line with a jigsaw.</div>
<div class="step">Reinstalling trim: construction adhesive on the back plus finish nails — adhesive prevents seasonal movement from reopening the joint. Wipe excess adhesive immediately with a damp cloth.</div>
</div>`},
                    {
                        title: "Sagging gutters and downspout issues", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Gutters that sag or pull away from fascia are among the most ignored maintenance items. The fix is almost always a $5 hanger and 20 minutes — but the fascia behind it may be the real problem.</p>
<div class="steps">
<div class="step">Standing water after rain = sag or incorrect pitch. Gutters should slope 1/4" per 10 feet toward the downspout. Check with a string line.</div>
<div class="step">Add hidden gutter hangers (screw-in type, not spike-and-ferrule). Drive a 2.5" hex screw through front and back of gutter, into fascia and rafter tail. Space at 24" maximum.</div>
<div class="step">Gutter pulling away from fascia: probe the fascia first — if it's soft, the fascia is rotted and must be replaced before re-hanging. A gutter hung on rotted fascia will pull away within a season.</div>
<div class="step">Downspout joint leaking: reseal from inside with gutter sealant. The upper section always inserts into the lower — water going the wrong way through a joint leaks regardless of sealant.</div>
<div class="step">Missing downspout extension: extend at least 6 feet from the foundation, or connect to a buried drain. This is one of the highest-value fixes for preventing foundation water intrusion.</div>
</div>`},
                    {
                        title: "Attic hatch air sealing and insulation", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>An unsealed attic hatch is one of the biggest energy leaks in a house — a 1 sq ft gap at ceiling height loses as much heat as a window open 3 inches all winter. Takes under an hour to fix properly.</p>
<div class="steps">
<div class="step">Test by touch on a cold day: draught at the perimeter = unsealed gaps. Condensation on or around the hatch = air leakage and insufficient insulation.</div>
<div class="step">Add closed-cell foam weatherstripping (1/2" thick, medium density) to the hatch frame perimeter. The hatch must compress the foam when closed to create a seal.</div>
<div class="step">Insulate the hatch door: cut rigid foam board (polyiso or XPS, R-10 minimum) to fit the top. Glue with foam board adhesive. Add a second layer to reach R-30 in cold climates.</div>
<div class="step">Pull-down attic stairs: weatherstrip the frame perimeter, insulate the door panel, or build an insulated cover that sits over the opening from the attic side.</div>
<div class="step">While up there: check insulation depth. R-49 minimum for most climate zones (roughly 14" blown cellulose or 15" blown fibreglass). If you can see the tops of the joists, the house is under-insulated.</div>
</div>`}
                ]
            },
            {
                id: "drywall", label: "Drywall", eyebrow: "Module 4 of 7", title: "Drywall — 14 common problems",
                intro: "From nail pops to invisible patches, texture matching to persistent cracks — 14 of the most common drywall issues with diagnosis-first approaches and the finishing technique that makes repairs disappear.",
                lessons: [
                    {
                        title: "Why patches show through paint", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>A patch that photographs perfectly but shows as a dull spot in raking light is called flashing — almost always a priming failure, not a finishing failure.</p>
<div class="callout callout-diag"><div class="callout-label">Why it happens</div><p>Fresh joint compound is highly porous. Unprimed, it absorbs paint unevenly — the patch absorbs more, leaving it flatter and less reflective. The fix is sealing the compound before painting, not adding more topcoats.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Apply a dedicated PVA drywall primer over all compound — not standard wall primer, which doesn't seal compound porosity</li>
<li><i class="fa-solid fa-check ci-green"></i>After PVA primer dries, skim one more thin coat over any pinholes, sand, and prime again — two primer coats over compound is the professional standard</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>If the wall sheen is eggshell or higher, repaint the entire wall to the nearest corner — spot-painting a satin wall always shows in raking light regardless of primer quality</li>
</ul>`},
                    {
                        title: "Nail pops and screw pops", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>Nail pops are circular bumps caused by lumber shrinkage pushing the fastener out. The correct fix takes 5 minutes per pop if you don't skip steps — and it won't come back.</p>
<div class="steps">
<div class="step">Drive a new drywall screw 2" above and below the popped fastener — this re-secures the drywall panel to the stud.</div>
<div class="step">Now drive the popped fastener deeper — it'll go further because the new screws hold the panel. Dimple it slightly below the surface.</div>
<div class="step">Apply two coats of lightweight compound over all three fasteners, feathering 4–6" around each.</div>
<div class="step">Sand, prime with PVA, paint. The repair is invisible. If you only fill without adding the new screws, the pop will return within a season.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>Multiple pops appearing simultaneously after a dry spell indicate rapid moisture change causing widespread lumber movement — check attic humidity and roof drainage before treating each one individually.</p></div>`},
                    {
                        title: "Small hole patching — under 6 inches", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>Holes under 6 inches need no backing. A self-adhesive mesh patch and two coats of compound is faster and just as strong. The mistake is applying compound too thick on the first coat.</p>
<div class="steps">
<div class="step">Clean hole edges — remove any loose paper or crumbling gypsum with a utility knife.</div>
<div class="step">Apply a self-adhesive fibreglass mesh patch centred over the hole. Press firmly — the mesh must be fully adhered or it'll lift during mudding.</div>
<div class="step">First coat: apply compound with a 6" knife, working it firmly into the mesh. Feather at least 4" beyond the mesh on all sides. Let dry completely — overnight is better than 4 hours.</div>
<div class="step">Second coat: use a 10" knife over a wider area. Goal is to make edges imperceptible. Let dry fully.</div>
<div class="step">Sand with 120-grit on a sanding sponge, wipe clean, PVA prime, then paint. Run your hand over in raking light — find any ridges before you paint.</div>
</div>`},
                    {
                        title: "Large hole repair — the California patch", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "45 min",
                        body: `<p>For holes 6–12 inches, the California patch (butterfly patch) uses the drywall paper itself as backing. No backer boards, no clips — and in 30 years it's still my preferred method for this size range.</p>
<div class="steps">
<div class="step">Cut a piece of new drywall larger than the hole (hole is 6×6", cut patch 9×9"). Score the back paper 1.5" from each edge. Snap and remove the gypsum, leaving a 1.5" paper border all around.</div>
<div class="step">Hold the patch over the hole and trace around the gypsum core. Cut the wall along that line — now the hole exactly matches the patch core.</div>
<div class="step">Apply compound to the wall around the hole, press the patch in place so the paper border lays flat on the wall surface. Embed the paper border fully into the compound.</div>
<div class="step">First coat: skim over the entire patch, feathering 8–10" beyond the paper edges. The paper acts as tape — it bridges the hole and provides the key for compound.</div>
<div class="step">Two more coats, each feathered wider. Sand, prime, paint. When done correctly this repair is completely invisible.</div>
</div>`},
                    {
                        title: "Large hole repair — backer board method", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "45 min",
                        body: `<p>For holes larger than 12 inches, or where you need to cut to studs, a backer-board patch with the cut taken to stud centres is the correct approach.</p>
<div class="steps">
<div class="step">Locate nearest studs on both sides of the hole. Mark stud centres. Cut the hole to a clean rectangle with sides running down the centre of each stud.</div>
<div class="step">Check for pipes and wires before cutting — use a battery-powered light inside the cavity. Cutting blindly is how plumbing repairs get created on drywall jobs.</div>
<div class="step">Cut a drywall piece to fit the opening exactly. Fasten with drywall screws into the studs — screws every 8" along each stud edge.</div>
<div class="step">Tape all four joints with paper tape embedded in compound. At butt joints, paper tape is always stronger than mesh — use paper here.</div>
<div class="step">Three coats, each wider, with full drying between coats. Match existing wall texture before painting.</div>
</div>`},
                    {
                        title: "Texture matching — orange peel, knockdown, skip trowel, popcorn", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "50 min",
                        body: `<p>Texture matching is the skill that separates an invisible repair from one that announces itself. Practice on cardboard until you've matched consistency and technique before touching the wall.</p>
<table class="dtable">
<thead><tr><th>Texture</th><th>Identification</th><th>Technique</th></tr></thead>
<tbody>
<tr><td>Orange peel</td><td>Uniform small bumps, no peaks, looks like citrus skin</td><td>Thin compound to milk consistency. Hopper or aerosol at 18". Multiple light passes — one heavy pass creates runs.</td></tr>
<tr><td>Knockdown</td><td>Flat irregular islands with distinct edges</td><td>Splatter thicker compound. Let tack 5–10 min (timing is critical). Drag a wide knife almost flat across the surface.</td></tr>
<tr><td>Skip trowel</td><td>Irregular arcs and partial-circle patterns, hand-applied look</td><td>Load a trowel with stiff compound, skip across surface at low angle in curved strokes. Irregular is correct.</td></tr>
<tr><td>Popcorn / acoustic</td><td>Chunky, rough ceiling texture with aggregate</td><td>Match bag product (coarse vs. medium) to existing. Hopper at 25–30 psi. Nearly impossible to match on a small patch — often better to scrape and retexture the whole ceiling.</td></tr>
</tbody>
</table>`},
                    {
                        title: "Persistent cracks — finding the active cause", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>A crack that comes back after patching has an active cause. Filling it again without addressing that cause is a 6-month fix.</p>
<table class="dtable">
<thead><tr><th>Pattern</th><th>Cause</th><th>Permanent fix</th></tr></thead>
<tbody>
<tr><td>Hairline at ceiling/wall joint, runs room length</td><td>Normal seasonal wood movement; truss uplift in cold climates</td><td>Remove paint at joint, apply flexible paintable caulk — caulk flexes with movement, compound doesn't</td></tr>
<tr><td>Diagonal cracks from door or window corners</td><td>Header deflection, lintel settling, or foundation movement</td><td>Monitor with crack monitor 3 months. Growing = structural engineer. Stable = fibreglass mesh + 3 coats compound.</td></tr>
<tr><td>Horizontal crack at mid-wall, multiple rooms</td><td>Significant foundation settlement</td><td>Structural investigation before any cosmetic repair — do not cover this without understanding it</td></tr>
<tr><td>Map cracking (web of small cracks)</td><td>Old oil-based paint over incompatible coating, or plaster dried too fast</td><td>Skim coat the entire surface with setting compound (Durabond) — patching individual cracks is futile</td></tr>
</tbody>
</table>`},
                    {
                        title: "Water-stained ceilings", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Never paint over a water stain without finding and fixing the source and sealing the stain. Water stains bleed through any number of latex paint coats.</p>
<div class="steps">
<div class="step">Find the source: inspect the attic above and look for the moisture entry point. Water travels along framing — the stain may be 2–4 feet from the actual leak.</div>
<div class="step">Let the ceiling dry completely after the source is fixed — minimum 2 weeks in normal conditions, or confirm below 12% moisture content with a moisture meter.</div>
<div class="step">If the drywall is soft or crumbly, it must be replaced — waterlogged drywall loses structural integrity and won't hold paint or compound.</div>
<div class="step">Seal the stain with shellac-based primer (Zinsser BIN) or oil-based stain blocker. Two coats for dark stains. This is non-negotiable — water stains contain minerals and tannins that bleed through latex paint indefinitely.</div>
<div class="step">Skim coat any surface damage, sand, PVA prime, paint. Repaint the entire ceiling rather than spot-painting — sheen differences always show on ceilings.</div>
</div>`},
                    {
                        title: "Drywall in bathrooms — moisture damage and repair", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>Bathroom drywall failures are almost always substrate failures — the wrong board was used or moisture found its way behind it. You're not just patching; you're correcting a systemic error.</p>
<div class="callout callout-warn"><div class="callout-label">Critical rule</div><p>Standard drywall must never be used in wet areas. Moisture-resistant (green board / purple board) is the minimum for bathroom walls. In shower and tub surrounds, cement board (Durock, HardieBacker) is required behind tile. Drywall of any type is wrong behind tile.</p></div>
<div class="steps">
<div class="step">Probe damaged area: soft drywall, delaminated paper, or mould behind the surface all mean the substrate must be replaced, not patched.</div>
<div class="step">Cut out all damaged material. Look behind — if framing is wet or mouldy, let it dry and treat with a mould-inhibiting primer before re-covering.</div>
<div class="step">Replace with correct substrate: moisture-resistant drywall for dry-side bathroom walls, cement board for any tiled area.</div>
<div class="step">Tape cement board joints with fibreglass mesh tape and thinset (not joint compound). Joint compound dissolves with moisture.</div>
<div class="step">Caulk all corners in tiled areas with flexible silicone — not grout. Corners move; grout cracks. Silicone stays waterproof 7–10 years then can be stripped and replaced.</div>
</div>`},
                    {
                        title: "Ceiling cracks — truss uplift and settlement", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Ceiling cracks can indicate roof structure movement — but most are benign. Reading the pattern correctly tells you the difference.</p>
<table class="dtable">
<thead><tr><th>Pattern</th><th>Cause</th><th>Action</th></tr></thead>
<tbody>
<tr><td>Straight crack parallel to a beam or wall</td><td>Drywall joint failure — tape bond failed</td><td>Re-tape the joint: scrape out loose compound, apply new paper tape embedded in compound, 3 coats</td></tr>
<tr><td>Crack at ceiling-wall junction, worst in winter</td><td>Truss uplift: trusses bow upward in cold dry weather</td><td>Do not nail partition tops to trusses. Repair with caulk, not compound — the crack returns if compound is used</td></tr>
<tr><td>Large irregular crack across multiple rooms</td><td>Foundation settlement or structural movement</td><td>Install crack monitors. If growing: structural engineer before repair</td></tr>
<tr><td>Fine map cracking on plaster ceiling</td><td>Aged plaster — normal for 60+ year old homes</td><td>Skim coat entire ceiling with setting compound — patching individual cracks in aged plaster is futile</td></tr>
</tbody>
</table>`},
                    {
                        title: "Skim coating — fixing bad walls", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "50 min",
                        body: `<p>When a wall has too many patches, old roller stipple, or uneven texture, skim coating the entire surface is often faster and gives a better result than fixing each problem individually.</p>
<div class="steps">
<div class="step">Prepare: fix all structural problems first — pops, cracks, holes. Skim coating over movement will crack. Prime the entire wall with PVA primer to seal and prevent the skim coat drying too fast.</div>
<div class="step">Mix joint compound to smooth peanut-butter consistency. Use a 12" or 14" knife for large areas. Work in 4×4 sections.</div>
<div class="step">First coat: 1/16" thick layer, feathering all edges to nothing. The wall looks rough wet and better dry — resist the urge to over-work it.</div>
<div class="step">Sand with 120-grit on a pole sander. Knock off ridges and tool marks, not down to the original surface. Wipe clean — compound dust kills paint adhesion.</div>
<div class="step">Second coat at 90° to the first — fills the valleys from the first coat's ridges. Sand, PVA prime, paint. Two skim coats over a properly prepared wall produces a smooth professional surface.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>Add 10–20% plaster of Paris to joint compound for skim coating — speeds drying and reduces shrinkage cracking. Test the ratio on a small area first; too much and it sets before you can work it.</p></div>`},
                    {
                        title: "Corner bead — installation, damage, and repair", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>A damaged corner bead looks like a drywall problem but is a substrate problem — the bead itself has bent and no amount of re-mudding holds until the bead is replaced.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Use vinyl bead in impact-prone corners — it flexes rather than denting, and doesn't crack the compound above it</li>
<li><i class="fa-solid fa-check ci-green"></i>Install metal bead with a crimper every 6", not nails or screws — fasteners create hard spots that telegraph through finish coats</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Before re-mudding a damaged corner: lay a straightedge along the bead. Any deviation over 1/16" = bead must be replaced, not re-coated</li>
<li><i class="fa-solid fa-check ci-green"></i>Add fibreglass mesh tape over a repaired corner bead before first coat — it bridges the gap between bead and drywall and prevents cracking when the corner takes another bump</li>
</ul>`},
                    {
                        title: "Drywall screws — correct technique and depth", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "20 min",
                        body: `<p>More drywall repairs are caused by bad installation technique than by damage. A screw driven too deep tears the paper face — a screw not deep enough creates a bump.</p>
<div class="callout callout-diag"><div class="callout-label">The dimple test</div><p>Run your hand over installed drywall. Each screw should leave a slight dimple — enough to hold compound — but you should not feel torn paper around it. Torn paper = screw went too deep, add a companion screw 2" away.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Use a drywall screw gun with a depth-stop bit — this is non-negotiable for consistent quality</li>
<li><i class="fa-solid fa-check ci-green"></i>Screw spacing: 16" on ceilings, 24" on walls (for standard 1/2" board)</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Never drive screws within 3/8" of the drywall edge — the gypsum crumbles and the screw has no holding power</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Drywall nails are inferior to screws in every application — nails pop, screws don't. There is no good reason to use nails for new drywall work</li>
</ul>`},
                    {
                        title: "Setting-type vs. drying-type compound — when to use each", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "20 min",
                        body: `<p>Most DIY drywall failures come from using the wrong compound for the application. These are fundamentally different materials — not just different brands.</p>
<table class="dtable">
<thead><tr><th>Type</th><th>How it works</th><th>Best uses</th><th>Avoid for</th></tr></thead>
<tbody>
<tr><td>Drying-type (all-purpose, lightweight)</td><td>Dries by water evaporation — shrinks as it dries</td><td>Taping, finish coats, texturing, skim coating</td><td>Filling gaps over 1/4" — excessive shrinkage causes cracking</td></tr>
<tr><td>Setting-type (Durabond, Easy Sand)</td><td>Hardens by chemical reaction — minimal shrinkage</td><td>First coat over backer board, large voids, humid areas, embedding tape on difficult repairs</td><td>Finish coats — too hard to sand smoothly by hand</td></tr>
</tbody>
</table>
<div class="callout callout-info"><div class="callout-label">The hybrid approach</div><p>Use Easy Sand 45 for the first coat on any repair deeper than 1/4" or in damp conditions — fills without shrinkage. Switch to all-purpose drying compound for second and third coats — easier to sand and feather smoothly.</p></div>`}
                ]
            },
            {
                id: "painting", label: "Painting", eyebrow: "Module 5 of 7", title: "Painting — 14 common problems",
                intro: "Paint failures, colour matching, sheen selection, stain blocking, trim technique, exterior problems, and the professional approaches that make work last — from someone who has rolled more square footage than most people have seen.",
                lessons: [
                    {
                        title: "Diagnosing paint failures", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Peeling, blistering, and alligatoring look similar from across the room but have completely different causes. Painting over a failure without diagnosing it guarantees a repeat.</p>
<table class="dtable">
<thead><tr><th>Failure</th><th>Cause</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Peeling in sheets (intercoat failure)</td><td>Painted over glossy surface without abrading, or over contamination (grease, wax, silicone)</td><td>Strip to substrate, clean with TSP, scuff with 80-grit, bond primer</td></tr>
<tr><td>Peeling from substrate</td><td>Moisture behind the paint pushing it off</td><td>Fix moisture source first. Strip, dry, prime with moisture-blocking primer</td></tr>
<tr><td>Blistering (bubbles)</td><td>Painting in direct sun on hot surface; moisture migrating through wall</td><td>Strip blistered area. Repaint in shade, surface temp below 90°F</td></tr>
<tr><td>Alligatoring</td><td>Hard topcoat over soft undercoat; applying too soon over oil paint</td><td>Strip fully, re-prime with flexible alkyd primer, allow full cure</td></tr>
<tr><td>Chalking exterior</td><td>Normal aging of oil-based paint; accelerated by UV</td><td>Wire brush off chalk, wash with TSP solution, bond prime before recoating</td></tr>
</tbody>
</table>`},
                    {
                        title: "Lap marks and roller stipple", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Lap marks and roller stipple are the two most common application problems. Both are avoidable — and nearly impossible to fix once the paint has dried.</p>
<div class="steps">
<div class="step">Lap marks: caused by rolling back into a section that has started to skin over. Prevention: work full-height sections without stopping. On large walls, cut in and roll before cut-in dries.</div>
<div class="step">Wet edge management: always feather each stroke back into the wet section. Never start in a dry area and roll into wet — that deposits a double layer at the transition.</div>
<div class="step">Roller stipple (texture peaks): caused by a cheap or wrong-nap roller. Smooth walls: 3/8" nap. Textured walls: 1/2"–3/4". Cheap covers shed fibres and leave peaks.</div>
<div class="step">Lay-off technique: after rolling a section, lightly roll back over it with a nearly dry roller in long vertical strokes — presses down stipple texture before it dries.</div>
<div class="step">Add Floetrol (latex) in warm or dry conditions: extends open time, reduces lap marks, improves flow significantly. Worth adding on any hot day.</div>
</div>`},
                    {
                        title: "Cutting in — technique for clean edges", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>A clean cut-in line is the mark of a professional paint job. It takes the right brush, the right loading technique, and practice — not tape on every edge.</p>
<div class="steps">
<div class="step">Brush: 2.5" angled sash brush. A quality brush (Purdy, Wooster) loads more paint, releases evenly, holds an edge. Cheap brushes can't do this regardless of technique.</div>
<div class="step">Loading: dip 1/3 of bristle length. Tap (don't wipe) each side on the inside of the can. Loads without overloading — a dripping brush makes a mess.</div>
<div class="step">The stroke: start 1/2" from the line, press until the bristles fan out, then draw toward the line. The fanned bristles create the controlled edge. Never lead with the tip.</div>
<div class="step">Ceiling line: look ahead of the brush, not at the bristles. Keep a damp rag in your free hand to wipe any runs immediately. Angle a torch along the ceiling to reveal mistakes while still wet.</div>
<div class="step">Roll before the cut-in dries: cut-in and rolled sections must blend while both are wet. If the cut-in has dried and you roll up to it, you'll see the line. Cut a manageable section, then roll immediately.</div>
</div>`},
                    {
                        title: "Painting bare wood trim", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Bare wood trim is the most demanding interior painting surface. Get the preparation right and it lasts 10 years. Skip steps and you'll be back within 2.</p>
<div class="steps">
<div class="step">Sand all bare wood with 120-grit then 180-grit, with the grain. Fill nail holes and open grain with wood filler, let dry, sand flush.</div>
<div class="step">Primer: oil-based primer (or water-based alkyd) penetrates wood better than latex and raises the grain less. Apply one coat, let dry 24 hours.</div>
<div class="step">After priming, sand lightly with 220-grit before the topcoat — water-based primers raise the grain. Skip this sanding and the finish feels rough. This is the step most people omit.</div>
<div class="step">Topcoat: water-based alkyd (Benjamin Moore Advance, SW Emerald Urethane) levels significantly better than standard latex and dries to a harder film. Two coats, sand between with 220-grit.</div>
<div class="step">End grain on horizontal trim: prime end grain separately, let soak in before the field coat. End grain is extremely absorbent and telegraphs as a dull patch if not addressed separately.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>Caulk trim after the first topcoat, not before priming. Caulk applied before primer often peels away from the paint within a year. Applied after the first topcoat, it bonds properly and stays put for 5–7 years.</p></div>`},
                    {
                        title: "Oil-based vs. water-based — where it still matters", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>Modern water-based alkyds have largely closed the performance gap — but there are still situations where choosing wrong costs you a repaint.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Bare wood trim: water-based raises grain and requires an extra sanding pass. Oil or water-based alkyd skips this and levels better on open-grained woods</li>
<li><i class="fa-solid fa-check ci-green"></i>Over existing oil-based paint: adhesion test first — score an X, press tape, pull. If paint lifts, scuff with 80-grit before recoating</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Never use standard latex directly over oil without bonding primer — latex can't grip a slick, non-porous oil surface and will peel within months</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Stain blocking: only shellac-based (BIN) or oil-based (Kilz Original) reliably blocks water stains, smoke, and tannin bleed — water-based stain blockers fail on these within weeks</li>
</ul>
<div class="callout callout-info"><div class="callout-label">Practical rule</div><p>Use water-based alkyd for trim, water-based latex for walls. Reserve oil-based for problem surfaces and floors. The cleanup is easier, dry time faster, durability equivalent for interior work.</p></div>`},
                    {
                        title: "Colour matching without a spectrophotometer", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>The hardware store scanner gets you close — rarely perfect. Metamerism and batch variation mean even a "perfect" match can look wrong in the room.</p>
<div class="steps">
<div class="step">Bring a 3"×3" minimum chip. The scanner needs clean, unobstructed painted surface. No substrate, no wallpaper, no trim showing at edges.</div>
<div class="step">Buy a quart, paint a 12"×12" sample on the actual wall. View it under different lighting at different times of day — morning sun, afternoon sun, evening artificial light. Matches under store fluorescents often diverge in the room.</div>
<div class="step">Too warm: ask the tinter to add a half-pump of raw umber. Too cool: half-pump of yellow oxide. These small adjustments can be made to a custom mix.</div>
<div class="step">Close but not invisible: paint corner-to-corner. The eye detects colour differences mid-wall readily and is very forgiving at natural break points.</div>
<div class="step">Paint over 5 years old: it has faded. A perfect mix of the original formula will look brighter. Ask the tinter to reduce the formula by 5–10% across all pigments to compensate.</div>
</div>`},
                    {
                        title: "Sheen selection and sheen problems", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "20 min",
                        body: `<p>Sheen affects both appearance and durability — and wrong sheen for the application is one of the most common paint job mistakes.</p>
<table class="dtable">
<thead><tr><th>Sheen</th><th>Best for</th><th>Avoid on</th></tr></thead>
<tbody>
<tr><td>Flat / matte</td><td>Ceilings, low-traffic bedrooms, hiding wall imperfections</td><td>Kitchens, bathrooms, kids' rooms — doesn't clean well</td></tr>
<tr><td>Eggshell</td><td>Living rooms, dining rooms, hallways</td><td>Ceilings — shows roller marks badly</td></tr>
<tr><td>Satin</td><td>Kitchens, bathrooms, high-traffic areas</td><td>Walls with imperfections — sheen amplifies every bump</td></tr>
<tr><td>Semi-gloss</td><td>Trim, doors, cabinets, bathrooms</td><td>Large wall surfaces — too much reflection</td></tr>
<tr><td>Gloss</td><td>Front doors, metal railings, furniture</td><td>Walls — shows every imperfection</td></tr>
</tbody>
</table>
<div class="callout callout-warn"><div class="callout-label">Sheen mismatch</div><p>Patch a satin wall with flat paint, or spot-paint in a different sheen, and the repair shows as a dull patch in raking light. Always match the sheen exactly, or repaint the entire wall.</p></div>`},
                    {
                        title: "Stain blocking — what works and what doesn't", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "20 min",
                        body: `<p>Water stains, smoke, tannin bleed, marker, and grease are the five problem surfaces standard primer cannot block. Using the wrong primer guarantees bleed-through.</p>
<div class="callout callout-diag"><div class="callout-label">The test</div><p>Apply your chosen primer. Cure 24 hours. Apply one coat white topcoat. If the stain shows through, the primer failed. This one-day test costs far less than a full repaint after the whole job is done.</p></div>
<table class="dtable">
<thead><tr><th>Problem</th><th>What works</th><th>What doesn't</th></tr></thead>
<tbody>
<tr><td>Water stains (light)</td><td>Shellac-based (BIN) or oil-based (Kilz Original)</td><td>Water-based stain blockers — bleed through within 6 months</td></tr>
<tr><td>Heavy smoke or fire damage</td><td>Two coats shellac-based (BIN) — no substitute</td><td>Any water-based product including premium stain blockers</td></tr>
<tr><td>Cedar/redwood tannin bleed</td><td>Shellac-based BIN or oil-based alkyd primer</td><td>Water-based products — tannin migrates through them</td></tr>
<tr><td>Grease (kitchen)</td><td>Clean with TSP first, then oil-based primer</td><td>Any primer applied over uncleaned grease</td></tr>
<tr><td>Marker, crayon</td><td>Shellac BIN applied directly over the mark</td><td>Latex primer — pigment migrates through it</td></tr>
</tbody>
</table>`},
                    {
                        title: "Painting over wallpaper", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Painting over wallpaper is almost always a mistake — but sometimes removing it would destroy the drywall beneath (common in older homes). If removal isn't an option, here's how to do it properly.</p>
<div class="callout callout-warn"><div class="callout-label">Always try removal first</div><p>Score the paper, spray with hot water and fabric softener solution, try a test area. If drywall comes off with the paper, stop. Skim-coating the entire wall after removal may be the lesser damage compared to painting over wallpaper.</p></div>
<div class="steps">
<div class="step">Repair all seams and bubbles: re-glue lifted seams with seam adhesive, press flat, let dry 24 hours. Apply joint compound over deep seams or damaged areas.</div>
<div class="step">Prime with oil-based primer — essential. Water-based primer soaks into the paper and causes it to bubble and lift. Oil-based seals without introducing moisture.</div>
<div class="step">After oil primer, check every inch for lifting seams and bubbles. Re-glue anything that moved and re-prime those spots.</div>
<div class="step">Two coats quality latex topcoat. Thin the first coat 10% with water to penetrate without raising the paper.</div>
<div class="step">Accept the limitation: painted wallpaper never looks like painted drywall. Seams show in raking light. Set this expectation with the client before starting.</div>
</div>`},
                    {
                        title: "Exterior paint failures", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>Exterior paint fails faster because UV, moisture, temperature cycling, and biological growth attack it simultaneously. Diagnosing which is winning tells you what prep to focus on.</p>
<table class="dtable">
<thead><tr><th>Failure</th><th>Cause</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Peeling in long strips</td><td>Moisture from inside the wall pushing out</td><td>Address interior moisture source before repainting. Use breathable primer.</td></tr>
<tr><td>Fading unevenly</td><td>South and west exposures get more UV</td><td>Use 100% acrylic with UV stabilisers. Re-coat affected sides more frequently.</td></tr>
<tr><td>Mildew (black/green spotting)</td><td>Shade, moisture, and organic material</td><td>Kill with 3:1 water/bleach, rinse, use mildew-resistant paint with biocide additive.</td></tr>
<tr><td>Cracking at caulk joints</td><td>Caulk failed before paint — bridging a flexible joint</td><td>Remove all old caulk to bare substrate. Recaulk with 50-year paintable silicone urethane. Prime caulk before painting over.</td></tr>
<tr><td>Rust staining around fasteners</td><td>Non-galvanised nails rusting under paint</td><td>Spot-prime with shellac or oil primer directly over each fastener. On re-sides: upgrade to stainless or hot-dip galvanised.</td></tr>
</tbody>
</table>`},
                    {
                        title: "Brush marks in trim — causes and prevention", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>Brush marks in trim are caused by paint drying faster than it can level. The fix is almost always product + temperature + technique — not a better brush.</p>
<div class="steps">
<div class="step">Paint in the right conditions: 65–75°F with moderate humidity. Hot, dry conditions cause paint to dry before it levels. Add Floetrol in those conditions.</div>
<div class="step">Don't over-brush: apply in one direction, then tip off lightly with the very tip of the brush in long strokes. Every additional pass after the paint starts to tack creates drag marks.</div>
<div class="step">Use the right product: standard latex on trim always shows brush marks. Use a water-based alkyd (Benjamin Moore Advance, Emerald Urethane) — these self-level significantly better.</div>
<div class="step">Thin the first coat 10%: it penetrates better, levels faster, and brush marks from the first coat disappear under the second.</div>
<div class="step">Persistent brush marks: sand between coats with 220-grit — knocks down the marks from the first coat. Two thinner coats always beat one thick one for trim.</div>
</div>`},
                    {
                        title: "Painting in difficult conditions", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>Temperature, humidity, and direct sunlight are the three environmental factors that wreck paint jobs. Most exterior failures trace back to painting in conditions they shouldn't have — usually because a deadline was tight.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Temperature: most latex paints require 50–90°F ambient AND surface temperature. Check surface temp with an infrared thermometer — a south-facing wall can be 30°F hotter than the air</li>
<li><i class="fa-solid fa-check ci-green"></i>Humidity above 85%: latex won't cure — it stays soft and sticky. Increase ventilation, use a dehumidifier, or wait for better conditions</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Direct sunlight on exterior: follow the shade around the house. North side in the morning, east in the afternoon. Paint chasing the shade produces a dramatically better result</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Rain within 4 hours: never paint exterior if rain is forecast within 4 hours. Even dried latex is susceptible to rain wash within the first 24 hours of cure</li>
</ul>`},
                    {
                        title: "Sprayer operation — tip selection and technique", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>An airless sprayer produces a flawless finish faster than a brush on large surfaces — but overspray, runs, and wrong tip selection waste more time than you save if you go in unprepared.</p>
<div class="callout callout-info"><div class="callout-label">Tip numbers decoded</div><p>First digit × 2 = fan width in inches. Last two digits = orifice in thousandths of an inch. 517: 10" fan, 0.017" orifice. Walls: 515–519. Trim: 210–212. Thick coatings: 521–523.</p></div>
<div class="steps">
<div class="step">Pressure: start at the lowest that atomises properly. Test on cardboard — uniform oval fan with no tails. Tails = increase pressure slightly. Too much pressure = excessive overspray.</div>
<div class="step">Distance and speed: 12" from surface, consistent arm speed. Trigger before the gun faces the surface, release before stopping. Triggering while stationary builds up a heavy spot.</div>
<div class="step">Overlap each pass 50%: the fan is heaviest centre, lighter at edges. 50% overlap compensates for this and creates even film thickness.</div>
<div class="step">Masking: cover everything within 20 feet. Fine mist is nearly invisible and travels far — cars, plants, windows, all of it.</div>
<div class="step">Thinning: most paints need 10–15% water for proper atomisation. Too thick = orange-peel texture. Test consistency: paint should flow in a continuous ribbon off the stir stick, not drop in blobs.</div>
</div>`},
                    {
                        title: "Paint storage and reuse", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "15 min",
                        body: `<p>Leftover paint stored correctly stays usable for 2–5 years. Stored poorly, it skins, separates, or grows mould and is wasted.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Store upside down to create an airtight seal at the lid — prevents a skin forming on the surface. Turn right-side up before opening</li>
<li><i class="fa-solid fa-check ci-green"></i>Store at room temperature — paint through a freeze-thaw cycle separates permanently (the lumpy cottage cheese test)</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Before using old paint: strain through a paint strainer into a clean bucket. Lumps from a skin cause problems even if you stir them in</li>
<li><i class="fa-solid fa-check ci-green"></i>Label every can with room, colour name, formula, and date — makes future touch-ups possible years later</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Never return contaminated paint (brush hairs, dust, insects) to the original can — it contaminates the whole can and ruins the next use</li>
</ul>`}
                ]
            },

                        body: `<p>The best diagnosticians in any trade follow a system, not intuition. Here's a transferable framework that works whether you're chasing an electrical fault or a mystery leak.</p>
<div class="steps">
<div class="step"><strong>Define the symptom precisely.</strong> Not "there's a leak" — where exactly, when does it happen, how much, what changed recently? A leak only when the upstairs shower runs is completely different from a leak after rain.</div>
<div class="step"><strong>Generate three possible causes.</strong> Never commit to the first explanation that fits. Write down the two others even if they seem less likely.</div>
<div class="step"><strong>Find the cheapest test that eliminates the most possibilities.</strong> A dye tablet in a toilet tank takes 30 seconds and eliminates the fill valve from suspicion entirely. Do the cheap tests first.</div>
<div class="step"><strong>Work from simple to complex.</strong> Most problems have simple causes. A loose wire nut causes the same symptom as a failed breaker — check the wire nut first.</div>
<div class="step"><strong>Know when you're out of scope.</strong> If the diagnostic process leads to gas lines, main panels, structural members, or active mould — stop and refer. Your value is accurate triage, not heroics.</div>
</div>`},

                        body: `<p>Scope creep is the single biggest profitability killer in handyman work. A $300 job that turns into a $1,000 job at a fixed price isn't a win — it's three jobs done for one payment.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Quote in writing with a specific scope statement — "replace kitchen faucet; excludes supply line replacement, valve work, or under-sink cabinet repairs"</li>
<li><i class="fa-solid fa-check ci-green"></i>When you discover unexpected work, stop, photograph it, and call the client immediately — never silently proceed and invoice for it later</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Have a standard change order form — even a text message with the dollar amount and the client's confirmation reply is your paper trail</li>
<li><i class="fa-solid fa-check ci-green"></i>Build a contingency line item on jobs involving opening walls, lifting floors, or removing fixtures — not a hidden markup, but an explicit buffer both parties understand</li>
</ul>`},
                    {
                        title: "Pricing for profit, not just covering costs", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Most self-employed handymen charge what feels fair and wonder why they're not making money. The problem is almost always an incomplete cost model.</p>
<div class="callout callout-info"><div class="callout-label">True cost model</div><p>Target take-home $80k/year: assume 40% of working hours are unbillable (driving, quoting, admin, callbacks). That leaves ~1,000 billable hours/year. Add 30% for taxes and self-employment, plus overhead. You need to invoice ~$140–160k to take home $80k — meaning your billable rate needs to be $140–160/hr, not $60–80.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Charge a flat trip/assessment fee for diagnostic calls — $75–150 is standard and filters out tire-kickers</li>
<li><i class="fa-solid fa-check ci-green"></i>Track actual time on every job for 3 months and compare to estimates — most people are 20–30% optimistic on time</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Materials markup of 15–20% over invoice is standard and expected — you're providing sourcing, transportation, and warranty on parts</li>
</ul>`},
                    {
                        title: "Building a referral engine", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>A referral is not an accident — it's the downstream result of a deliberate process. Clients refer when they trust you, remember you, and have an easy way to share your details.</p>
<div class="steps">
<div class="step"><strong>The follow-up call.</strong> Ring 3–5 days after a job to ask if everything is working well. Most tradespeople never do this. The call itself builds trust — and if there's an issue, you'd rather know now than via a Google review.</div>
<div class="step"><strong>Make it easy to refer.</strong> Text the client a link to your Google Business page immediately after they express satisfaction. Ask when they're still in the warm afterglow of a completed job, not weeks later.</div>
<div class="step"><strong>Own a niche in the client's mind.</strong> "My handyman does everything" is a weak referral. "My handyman is the best at drywall repair — you can't see his patches" is strong. Pick one or two skills to be known for and deliver them exceptionally.</div>
<div class="step"><strong>Stay on the radar.</strong> A quarterly maintenance reminder to your existing client list takes 20 minutes and generates more call-backs than any advertising spend.</div>

<body>
    <header class="site-header">
        <p class="eyebrow">Intermediate — Advanced</p>
        <h1>Advanced Handyman Course</h1>

            someone who has been doing this for 30 years.</p>
        <div class="header-stats">
            <div class="stat"><span class="stat-num">8</span><span class="stat-label">Modules</span></div>
            <div class="stat"><span class="stat-num">102</span><span class="stat-label">Lessons</span></div>
            <div class="stat"><span class="stat-num">~43 hrs</span><span class="stat-label">Content</span></div>
        </div>

    <div class="page-body">
        <nav class="course-nav" id="nav" aria-label="Course modules"></nav>
        <div id="modules"></div>
    </div>
    <script>
        const data = [
            {
                id: "plumbing", label: "Plumbing", eyebrow: "Module 1 of 7", title: "Plumbing — 14 common problems",
                intro: "From dripping faucets to sewer smells, low pressure to water heater failures — 14 of the most common plumbing problems in homes, with diagnosis-first approaches and step-by-step fixes.",
                lessons: [
                    {
                        title: "Dripping faucets", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Very common", c: "badge-warn" }], dur: "35 min",
                        body: `<p>A faucet that drips once per second wastes over 3,000 litres a year. The fix is different for each faucet type — the first step is always identification.</p>
<div class="callout callout-diag"><div class="callout-label">Identify your faucet type first</div><p>Compression: rubber washer on a threaded stem. Cartridge: cylindrical cartridge, pulls straight out. Ball: round slotted ball, common on single-handle kitchen faucets. Ceramic disc: flat ceramic disc, rarely fails but can crack.</p></div>
<div class="steps">
<div class="step">Shut off the supply valve under the sink. Turn on the tap to release residual pressure and confirm water is off.</div>
<div class="step">Remove the handle — usually one screw hidden under a decorative cap. Photograph all parts before disassembly.</div>
<div class="step">Compression: unscrew the packing nut, remove the stem, replace the rubber washer at the bottom and O-rings on the stem. Replace the seat if it's grooved — use a seat wrench.</div>
<div class="step">Cartridge: pull the cartridge straight out (may need a cartridge puller). Take the old one to the hardware store to match exactly. Insert new cartridge in the same orientation.</div>
<div class="step">Ball: replacement kit includes new springs, seats, and ball. Replace all at once — if the ball has worn, the seats have too.</div>
<div class="step">Reassemble, turn water on slowly, and test. A single drip after replacement means the seat is damaged — replace it with a seat wrench.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Common mistake</div><p>Overtightening a compression faucet to stop the drip destroys the seat. A dripping compression faucet needs a new washer, not more torque.</p></div>`},
                    {
                        title: "Running toilets", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Very common", c: "badge-warn" }], dur: "30 min",
                        body: `<p>A running toilet wastes up to 200 litres per day. The dye test identifies the cause in 60 seconds before you touch anything.</p>
<div class="callout callout-info"><div class="callout-label">The dye test</div><p>Drop food colouring in the tank. Don't flush. Wait 10 minutes. Colour in the bowl = flapper leak. No colour but still running = fill valve or float issue. Water above the overflow tube = float set too high.</p></div>
<div class="steps">
<div class="step">Do the dye test first — it takes 10 minutes and pinpoints the problem before you touch anything.</div>
<div class="step">Flapper leak: turn off supply, flush to drain tank. Run a finger around the seat — rough or pitted = you need a new flush valve body, not just a flapper.</div>
<div class="step">New flapper: match by brand. Connect chain with 1/2" slack. Too much slack = won't seal. Too little = won't close.</div>
<div class="step">Float too high: adjust the fill valve float screw anti-clockwise until the waterline sits 1" below the top of the overflow tube.</div>
<div class="step">Fill valve won't shut off: replace the whole fill valve. Shut off supply, flush, sponge out water, disconnect supply line, unscrew locknut under tank, lift out old valve, install new one.</div>
<div class="step">After any repair, do a final dye test to confirm the fix.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>Flappers degrade from chlorine in municipal water. In heavily chlorinated areas, replace them every 3–4 years proactively — they're a $5 part.</p></div>`},
                    {
                        title: "Blocked drains", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Very common", c: "badge-warn" }], dur: "30 min",
                        body: `<p>Most drain blockages are within a metre of the fixture. The mistake is reaching for chemicals before locating exactly where the blockage is.</p>
<div class="callout callout-diag"><div class="callout-label">Scope the blockage first</div><p>Single fixture slow = local blockage (strainer, P-trap, first metre of drain). Multiple fixtures backing up = main line or shared stack. Gurgling toilet when sink drains = venting problem, not a blockage.</p></div>
<div class="steps">
<div class="step">Start at the strainer. Remove and clear hair and debris with a Zip-It tool or needle-nose pliers — fixes the majority of bathroom sink and shower blockages.</div>
<div class="step">P-trap next: place a bucket beneath, unscrew the slip nuts, remove the trap, clean it out, and reinstall.</div>
<div class="step">Still blocked: feed a drain snake past where the trap was. Turn clockwise as you feed to engage the blockage, pull back slowly.</div>
<div class="step">Kitchen sink: avoid caustic chemicals — they degrade plastic pipes. A dedicated kitchen drain snake navigates bends better than a standard snake.</div>
<div class="step">Multiple fixtures blocked = main line issue. This is beyond handyman scope — a plumber with a powered auger or hydro-jet is the correct call.</div>
<div class="step">After clearing: flush with hot water for 2 minutes. Monthly: baking soda + vinegar as a maintenance routine for kitchen drains.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Never use chemicals on</div><p>Completely blocked drains — chemicals sit in the pipe, concentrate, and can damage PVC or attack the seals in your P-trap.</p></div>`},
                    {
                        title: "Low water pressure", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Low pressure at one fixture is almost always a local problem. Low pressure throughout the house is a supply-side problem. Diagnosing the scope first saves hours of unnecessary work.</p>
<div class="callout callout-diag"><div class="callout-label">Test pressure at the source</div><p>Use a $15 hose-bib gauge at an outdoor tap near the meter. Normal range: 45–80 psi. Under 45 psi = PRV or supply issue. Over 80 psi = PRV adjustment needed. Fine at meter but low at fixture = local problem (aerator, shutoff, scale).</p></div>
<div class="steps">
<div class="step">Single fixture: unscrew the aerator, soak in white vinegar 30 min, reassemble. This fixes most single-tap pressure problems.</div>
<div class="step">Hot side only: suspect the water heater shutoff valve or a failing tempering valve. Test by running cold vs. hot separately.</div>
<div class="step">PRV adjustment: locate the bell-shaped valve where the main enters. Clockwise = increase pressure, anti-clockwise = decrease. One full turn ≈ 8–10 psi. Note the current setting before adjusting.</div>
<div class="step">Gate valves that are 80% open look fully open but restrict dramatically — open all isolation valves fully and check.</div>
<div class="step">Galvanised pipes (pre-1960s): mineral buildup progressively reduces internal diameter. No fix short of repiping with PEX or copper.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Neighbour test</div><p>Ask a neighbour if they have the same issue before investigating your system. Municipal supply problems are common after nearby street work — a utility call may fix it without touching your house.</p></div>`},
                    {
                        title: "Water heater problems", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Advanced", c: "badge-adv" }], dur: "45 min",
                        body: `<p>Water heater calls split into three: no hot water, not enough hot water, and strange noises or smells. Each points to a different component.</p>
<div class="callout callout-diag"><div class="callout-label">Symptom map</div><p>No hot water (electric) = tripped breaker or failed element. No hot water (gas) = pilot out, thermocouple, or gas supply. Not enough hot water = undersized unit, sediment, or failed lower element. Popping/rumbling = sediment on tank floor. Rotten egg smell = bacterial growth from thermostat set too low.</p></div>
<div class="steps">
<div class="step">Electric, no hot water: reset the high-limit button (red button behind access panel, push firmly until it clicks). If it trips again immediately, a heating element has shorted.</div>
<div class="step">Test elements with a multimeter (power off at breaker): disconnect wires, set to ohms. Good element = 10–30Ω. Zero or infinite = failed.</div>
<div class="step">Element replacement: shut off cold supply, drain via hose, remove with 1.5" element wrench, install new element with fresh gasket, refill before restoring power — a dry element destroys itself instantly.</div>
<div class="step">Annual sediment flush: hose to drain valve, run until clear. If valve won't close after flushing, replace it — they're $8 and worth doing.</div>
<div class="step">Anode rod: remove with 1-1/16" socket. Replace if under 1/2" diameter or heavily corroded. A depleted anode rod is the primary cause of premature tank failure.</div>
<div class="step">Rotten egg: raise temperature to 60°C / 140°F for 2–3 hours to kill bacteria, then flush. If smell returns, replace the anode rod with a magnesium type.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Safety</div><p>Never work on a gas water heater gas supply, pilot assembly, or venting yourself. Electric element replacement is safe only if the breaker is confirmed dead with a non-contact tester before touching any wire.</p></div>`},
                    {
                        title: "Leaking pipes", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>Accessible pipe leaks are a 30-minute fix. Leaks inside walls require finding the source before anything is opened — water travels along framing before dripping.</p>
<div class="callout callout-diag"><div class="callout-label">Finding hidden leaks</div><p>Shut off every tap and appliance. Read your water meter, wait 2 hours without using any water, read again. If the meter moved, you have an active supply-side leak. A moisture meter traces extent without opening drywall unnecessarily.</p></div>
<div class="steps">
<div class="step">Apply a temporary pipe repair clamp to stop damage immediately while you prepare for the permanent fix.</div>
<div class="step">Small copper leak: cut out a 150mm section around the leak with a pipe cutter. Clean ends with emery cloth until bright copper. Install push-fit couplings — mark insertion depth, push firmly until the mark disappears.</div>
<div class="step">Soldered joint leak: dry the pipe completely before attempting to re-solder — water in the pipe prevents solder from flowing. A heat gun plus dry rags works.</div>
<div class="step">Threaded joint leak: drain, dry, apply PTFE tape clockwise (3–4 wraps), reassemble. Wrapping anti-clockwise unwinds when you tighten.</div>
<div class="step">After repair: restore pressure slowly and watch for 5 minutes. Wipe dry first so any new weeping is immediately visible.</div>
</div>`},
                    {
                        title: "Faulty toilet fill valve", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>A fill valve that hisses constantly, cycles on and off, or takes more than 3 minutes to refill is at end of life. Replacement costs under $15 and takes 20 minutes.</p>
<div class="callout callout-diag"><div class="callout-label">Symptom map</div><p>Constant hissing = worn diaphragm. Cycling every 20 min = flapper leak (do dye test first). Very slow refill = obstructed or failing valve. Water hammer when filling = supply pressure too high for the valve's rating.</p></div>
<div class="steps">
<div class="step">Shut off supply, flush to empty tank, sponge out remaining water.</div>
<div class="step">Disconnect supply line from the fill valve shank under the tank.</div>
<div class="step">Unscrew the plastic locknut under the tank anti-clockwise. Old valve lifts straight out.</div>
<div class="step">Critical: adjust height on new valve before locking — top of the overflow port must sit 1" above the top of the flush valve overflow tube.</div>
<div class="step">Hand-tighten locknut, then 1/2 turn more — do not over-tighten or you'll crack the tank.</div>
<div class="step">Adjust float so water fills to 1" below the top of the overflow tube. Flush twice, confirm refill time is under 90 seconds.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>The Fluidmaster 400A is the industry standard — universal fit, quiet, and parts available everywhere. Avoid no-name fill valves; plastic quality varies dramatically.</p></div>`},
                    {
                        title: "Pipe condensation and sweating", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "25 min",
                        body: `<p>Sweating pipes create enough moisture to rot framing and grow mould over years. It's not a plumbing failure — it's a physics problem.</p>
<div class="callout callout-diag"><div class="callout-label">Confirm it's condensation, not a leak</div><p>Dry the pipe completely. Wait 30 minutes. Moisture reappearing on the outside (not at joints) = condensation. Moisture only at joints = slow leak — treat differently.</p></div>
<div class="steps">
<div class="step">Insulate cold water supply lines with closed-cell foam pipe insulation. Cut to length with a utility knife, snap onto the pipe.</div>
<div class="step">At joints, elbows, and tees: cut insulation at 45° angles so pieces meet tightly — gaps are thermal bridges and will still sweat.</div>
<div class="step">Seal all seams with self-sealing pipe wrap tape or contact cement — an unglued seam defeats the insulation.</div>
<div class="step">In crawlspaces: vapour barrier encapsulation reduces ambient humidity and is often more effective than insulating individual pipes.</div>
<div class="step">Sweating in conditioned space: the pipe may be in a poorly insulated exterior wall cavity. Routing the pipe away from the exterior is the real fix.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Watch for</div><p>Visible mould or staining on framing around sweating pipes means moisture has been present for months. Probe timber for rot before covering anything.</p></div>`},
                    {
                        title: "Garbage disposal problems", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Garbage disposals fail in three ways: won't turn on, hums but won't spin, or leaks. Each has a specific fix and most are resolved without replacement.</p>
<div class="callout callout-diag"><div class="callout-label">Symptom map</div><p>No sound at all = tripped thermal overload (reset button). Hums but won't spin = jam (hex key at bottom). Leak from top = plumber's putty seal failed. Leak from side = clamp or fitting issue.</p></div>
<div class="steps">
<div class="step">Won't turn on: press the red reset button on the bottom of the unit firmly until it clicks. Restore power and test.</div>
<div class="step">Hums but won't spin: TURN OFF POWER. Insert a 1/4" hex key into the port on the bottom centre. Work it back and forth to free the jam.</div>
<div class="step">Use tongs — never your hand — to remove whatever was jamming from above. Restore power — unit should spin freely.</div>
<div class="step">Leak at sink flange: loosen mounting ring, push disposal down to access flange from above, remove old putty, apply fresh rope of plumber's putty, reseat and retighten.</div>
<div class="step">Leak at side connections: tighten hose clamp (dishwasher inlet) or re-tape threads and re-seat gasket (drain outlet).</div>
</div>
<div class="callout callout-diag"><div class="callout-label">Diagnosis shortcut</div><p>No sound at all? Test the outlet under the sink first — it's often switched and may be on the same switch as the disposal. Test with another appliance before opening anything.</p></div>`},
                    {
                        title: "Sewer smell in the house", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Sewer gas is hydrogen sulphide — unpleasant and flammable at high concentrations. The source is almost always a dry P-trap, a cracked wax ring, or a failed vent.</p>
<div class="callout callout-diag"><div class="callout-label">Locate the source by zone</div><p>One room only = floor drain with dry P-trap (most common cause). Bathroom = check toilet wax ring (toilet rocks slightly if ring has failed). Throughout house = blocked or cracked roof vent. When it rains = cracked vent pipe in a wall cavity.</p></div>
<div class="steps">
<div class="step">Pour 500ml of water into every floor drain in the affected area. Add a tablespoon of cooking oil to slow evaporation. If smell clears in 30 minutes, a dry P-trap was the culprit.</div>
<div class="step">Toilet wax ring: rock the toilet — 2–3mm of movement = failed ring. Shut off supply, flush, sponge out water, remove bolts, lift toilet, scrape old wax, install new ring, reset.</div>
<div class="step">Blocked vent: get on the roof, clear debris from the vent opening, flush with a garden hose from the top down for 30 seconds.</div>
<div class="step">Cracked vent inside a wall: use a smoke test (pressurised theatrical smoke in the drain system) — smoke emerges from the crack location. Requires opening the wall.</div>
<div class="step">Seldom-used fixtures that dry repeatedly: install a trap primer valve or a TrapSeal device that maintains the water seal automatically.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Safety</div><p>Strong, persistent sewer smell = ventilate immediately, no open flames. Hydrogen sulphide is flammable and toxic at high concentrations. If you cannot locate the source within a day, call a plumber.</p></div>`},
                    {
                        title: "Water pressure: PRV and supply diagnosis", badges: [{ t: "Diagnostics", c: "badge-diag" }, { t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Low pressure throughout a house is almost always a PRV or supply-side issue. Diagnosing correctly before adjusting anything prevents creating a new problem.</p>
<div class="callout callout-diag"><div class="callout-label">Gauge test first</div><p>$15 hose-bib gauge at an outdoor tap near the meter. Under 45 psi = supply issue or PRV set too low. Over 80 psi = PRV needs adjustment or replacement. A failing PRV often oscillates — pressure fluctuates rather than staying consistent.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>PRV adjustment: clockwise raises pressure, anti-clockwise lowers; one full turn ≈ 8–10 psi; PRV lifespan is 10–15 years</li>
<li><i class="fa-solid fa-check ci-green"></i>Scale-blocked galvanised pipes show low pressure only when multiple fixtures run simultaneously — vinegar flush won't fix severe buildup; repipe</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Gate valve that's partially closed looks fully open — confirm all isolation valves are turned fully anti-clockwise before adjusting the PRV</li>
<li><i class="fa-solid fa-xmark ci-red"></i>High pressure over 80 psi damages appliances silently and accelerates joint failure — don't ignore it even if nothing is leaking yet</li>
</ul>`},
                    {
                        title: "Phantom flushes and advanced toilet diagnosis", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Phantom flushes, dual-flush failures, and pressure-assist toilets — going deeper on toilet diagnosis beyond basic flapper and fill valve replacement.</p>
<div class="steps">
<div class="step">Phantom flush every 20 minutes: the dye test confirms flapper leak. Run a finger around the flush valve seat — any roughness or mineral deposit and the seat needs replacing, not just the flapper.</div>
<div class="step">Replacing a flush valve seat: requires draining the tank fully and using a seat removal tool. Apply a new seat washer ring and re-seat — this is the correct fix when a new flapper doesn't stop the phantom flush.</div>
<div class="step">Dual-flush button one position flushes full volume: the seal between the upper and lower sections of the flush valve is worn. Replacement seal kits are model-specific — take a photo of the valve body to match parts.</div>
<div class="step">Dual-flush button stuck or difficult to push: calcium deposits binding the button mechanism. Soak with white vinegar, work the button to free the deposits.</div>
<div class="step">Pressure-assist toilet (loud whoosh when flushed): these use a pressurised vessel inside the tank. Never attempt to repair the vessel — if it fails, replace the entire pressure unit as an assembly. The outer tank is just a housing.</div>
</div>`},
                    {
                        title: "Water hammer and noisy pipes", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Water hammer is hydraulic shock — a pressure wave when a valve shuts quickly. Chronic hammer damages joints and appliances. Ticking or creaking pipes are thermal expansion — a completely different problem with a different fix.</p>
<table class="dtable">
<thead><tr><th>Symptom</th><th>Cause</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Loud bang after appliance shuts off</td><td>Hydraulic hammer, no air cushion</td><td>Install hammer arrestors at washing machine supply; or recharge air chambers</td></tr>
<tr><td>Banging in hot water pipes only</td><td>Thermal expansion in CPVC</td><td>Add expansion loops or flexible connectors; ensure pipes are properly supported</td></tr>
<tr><td>Ticking/creaking through walls</td><td>Pipe rubbing against framing as it expands</td><td>Add foam insulation sleeve around pipe at the contact point</td></tr>
<tr><td>Humming at high flow</td><td>PRV or fill valve vibration (worn diaphragm)</td><td>Replace PRV; replace fill valve</td></tr>
</tbody>
</table>`},
                    {
                        title: "PEX supply line work and push-fit fittings", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "45 min",
                        body: `<p>PEX has made supply-side repairs far more accessible. Push-fit failures are almost always installation errors, not product failures — the technique matters.</p>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Cut PEX square — angled cuts prevent full seating. Use a dedicated PEX cutter, not a utility knife</li>
<li><i class="fa-solid fa-check ci-green"></i>Mark insertion depth with a marker before pushing — you should see the mark disappear flush with the fitting body to confirm full seating</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Push-fit fittings are useful for accessible temporary repairs, but use crimp or clamp fittings behind walls and in concealed locations</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Never use push-fit fittings on corrugated stainless (CSST) or old PE pipe — only copper, CPVC, and PEX</li>
</ul>
<div class="callout callout-warn"><div class="callout-label">Behind walls</div><p>SharkBite allows in-wall use, but many inspectors prefer crimp or clamp rings in concealed locations. The failure mode of an unseated push-fit is a slow leak you won't discover until the ceiling shows water damage months later.</p></div>`}
                ]
            },
            {
                id: "electrical", label: "Electrical", eyebrow: "Module 2 of 7", title: "Electrical troubleshooting — 14 common problems",
                intro: "Dead outlets, tripped breakers, flickering lights, GFCI trips, ceiling fans, dimmers, aluminium wiring and more — 14 of the most common electrical issues with diagnosis-first approaches and safe step-by-step fixes.",
                lessons: [
                    {
                        title: "Dead outlets — tracing the real cause", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>A dead outlet is rarely a bad outlet. The fault is almost always upstream — a tripped GFCI, a loose backstab connection, or a wire nut that has vibrated loose. Replacing the outlet without tracing the circuit wastes time and misses the cause.</p>
<div class="callout callout-diag"><div class="callout-label">Work upstream before opening anything</div><p>Check the panel first — a breaker can trip to a middle position that isn't clearly off. Then find and press RESET on every GFCI outlet in the bathroom, kitchen, garage, and exterior. A GFCI in the garage routinely protects bathroom or kitchen outlets downstream.</p></div>
<div class="steps">
<div class="step">Reset the breaker: firmly to OFF, then ON. A breaker that won't hold is a separate problem — don't keep resetting it.</div>
<div class="step">Find and reset every GFCI outlet on the likely circuit — press firmly, they need positive engagement.</div>
<div class="step">If still dead: pull the outlet and check for loose backstab connections. Move all wires to screw terminals.</div>
<div class="step">Check the outlet upstream using a non-contact tester — power may have stopped at a loose wire nut in a junction box.</div>
<div class="step">A plug-in circuit tracer ($30) maps every outlet on a circuit without touching wiring — invaluable on a first visit to any unfamiliar house.</div>
</div>`},
                    {
                        title: "Tripped breakers that won't reset", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>A breaker that trips immediately on reset has an active fault. A breaker that trips only under load is usually an overloaded circuit or a failing breaker. These need different responses.</p>
<div class="callout callout-diag"><div class="callout-label">Diagnosis</div><p>Trips immediately on reset = short circuit or ground fault. Unplug everything first. Trips only under load = overload or loose connection generating heat. Trips randomly with no load = failing breaker.</p></div>
<div class="steps">
<div class="step">Unplug every device on the circuit. Reset. If it holds, plug appliances back one at a time — the one that causes the trip has a fault.</div>
<div class="step">If it trips with nothing plugged in, the fault is hardwired: a light, ceiling fan, or hardwired appliance. Disconnect them one at a time to isolate.</div>
<div class="step">Overloaded circuit: a 15A circuit handles 1,800W continuous (80% of 2,250W). Kitchen countertop circuits should be dedicated 20A.</div>
<div class="step">A breaker that trips at random with no fault found is a failing breaker — replace like-for-like. Brand matters; breakers are not universally interchangeable.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Never</div><p>Replace a breaker with a higher-rated one to stop nuisance tripping. The breaker protects the wire. A 14AWG wire on a 20A breaker will overheat before the breaker trips.</p></div>`},
                    {
                        title: "Flickering lights — diagnosis by pattern", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>The flicker pattern tells you almost everything about the cause before you touch a wire.</p>
<table class="dtable">
<thead><tr><th>Pattern</th><th>Cause</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>One bulb flickers, others fine</td><td>Loose bulb, failing LED driver, or incompatible dimmer</td><td>Re-seat bulb; replace bulb; check dimmer compatibility</td></tr>
<tr><td>Whole room flickers together</td><td>Loose connection in the circuit</td><td>Inspect switch wiring and junction boxes on that circuit; tighten loose connections</td></tr>
<tr><td>Whole house briefly when large appliance starts</td><td>Normal voltage sag from motor startup</td><td>No fix needed unless severe — then check service entrance connections</td></tr>
<tr><td>Flickers correlate with neighbour's heavy use</td><td>Shared transformer or utility feed</td><td>Call the utility — not a house wiring problem</td></tr>
<tr><td>Random whole-house flicker any time</td><td>Loose neutral at service entrance or meter base</td><td>Call the utility immediately — potentially dangerous</td></tr>
</tbody>
</table>
<div class="callout callout-warn"><div class="callout-label">Take seriously</div><p>A loose neutral at the service entrance causes voltage imbalance between phases — lights brighten and dim while appliances run at wrong voltage. This destroys appliances and is a fire hazard. Call the utility that day.</p></div>`},
                    {
                        title: "GFCI outlets — nuisance trips and failures", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>A GFCI that trips frequently may be protecting you from a real fault — not just being a nuisance. The difference matters.</p>
<div class="steps">
<div class="step">Trips immediately on reset: active ground fault downstream. Disconnect everything on the LOAD side and test again. Add downstream loads back one at a time.</div>
<div class="step">Trips with a specific appliance: test that appliance on a different non-GFCI circuit. If it trips there too, the appliance has a ground fault — retire it.</div>
<div class="step">Trips on long outdoor runs with nothing plugged in: capacitive leakage in long cables. Install a GFCI rated for wet locations with a weatherproof while-in-use cover.</div>
<div class="step">Won't reset even with everything disconnected: the GFCI itself has failed. Replace it — GFCIs fail safe (won't reset) rather than fail open. Lifespan is 10–15 years.</div>
<div class="step">Test every GFCI monthly with the TEST button. If TEST doesn't cut power, the device has failed and must be replaced — it's providing no protection.</div>
</div>`},
                    {
                        title: "Dead switches and replacement", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>A switch that stopped working is the switch itself, a loose connection, or a dimmer with an incompatible load. Run through this before buying parts.</p>
<div class="steps">
<div class="step">Confirm the circuit has power: test the outlet on the same circuit, or test the switch box with a non-contact tester before pulling it.</div>
<div class="step">Pull the switch and inspect for loose terminals or burn marks. A scorch mark means arcing — fire risk. Replace the switch and inspect all wiring carefully.</div>
<div class="step">Test the switch with a continuity tester (power off): toggle while probing the two terminals. Continuity in one position, none in the other = good. No change either way = dead switch.</div>
<div class="step">Replacing: photograph wiring first. Note which terminal has the hot wire, reconnect to the same terminal on the new switch. Ground to green screw.</div>
<div class="step">Dimmer flickering or buzzing: check the spec sheet for compatible load types. LED dimmers require LED-rated dimmers. Old dimmers with minimum load ratings don't work well with modern LEDs.</div>
</div>`},
                    {
                        title: "Ceiling fan wobble, noise, and wiring", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>A wobbling ceiling fan is almost never a motor problem — it's blade balance or mounting. A humming fan on a dimmer is always a compatibility problem.</p>
<div class="callout callout-diag"><div class="callout-label">Wobble diagnosis</div><p>Check blade brackets first — any blade slightly bent or with a loose bracket screw creates wobble. Use the balancing kit (included with most fans or $5) before assuming anything mechanical.</p></div>
<div class="steps">
<div class="step">Wobble: tighten every blade bracket screw. Check each blade for warp with a ruler across the face — a warped blade needs replacement, not balancing.</div>
<div class="step">Balancing kit: clip to trailing edge at midpoint of each blade in turn. The one that reduces wobble most is the problem blade. Stick the permanent weight at the clip location.</div>
<div class="step">Humming on a dimmer: ceiling fans need a fan speed controller, not a light dimmer. A light dimmer changes voltage in a way that causes the motor to hum and run hot.</div>
<div class="step">New fan box: confirm the existing box is fan-rated (stamped on the box). A standard light box will fail from the dynamic load of a spinning fan. Use a fan-rated brace bar if upgrading.</div>
<div class="step">Two-wire ceiling (no blue wire): connect both fan black and blue wires to the single ceiling black wire. Fan and light will be controlled together — for separate control, use a wireless remote kit.</div>
</div>`},
                    {
                        title: "Bathroom exhaust fan replacement", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "40 min",
                        body: `<p>A failed bathroom fan is one of the highest-value repairs a handyman can do — moisture without ventilation destroys paint, grows mould, and rots framing over years.</p>
<div class="steps">
<div class="step">Turn off the circuit breaker. Remove the grille and confirm power is off with a non-contact tester. Unplug the motor from the quick-disconnect inside the housing.</div>
<div class="step">Measure the existing housing and duct diameter (3" or 4"). Buy a drop-in replacement motor for the same housing — avoids cutting drywall.</div>
<div class="step">Replacing the full unit: disconnect duct, remove housing from between joists (held by side braces), disconnect cable from wiring connector.</div>
<div class="step">Install new housing. Route duct to the exterior — never into the attic. Use smooth rigid duct; flex duct collects moisture and reduces airflow significantly.</div>
<div class="step">Reconnect: black to black, white to white, ground to green. Connect duct with foil tape (not screws on flex duct — screws catch lint and restrict airflow).</div>
<div class="step">CFM sizing: 1 CFM per square foot, minimum 50 CFM. Bathrooms with showers: 80 CFM minimum.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Pro tip</div><p>Replace the flex duct to the exterior vent cap at the same time. Old flex duct is almost always partially crushed and full of lint — it's the single biggest improvement to fan performance for $15 of materials.</p></div>`},
                    {
                        title: "Outdoor GFCI and weatherproof outlet failures", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Outdoor outlets fail more often than any other type — moisture, UV, insects, and temperature cycling all attack them. Most failures are in the device or cover, not the wiring.</p>
<div class="steps">
<div class="step">Check the GFCI protecting the circuit first — almost always indoors (garage, kitchen). Reset it before doing anything outside.</div>
<div class="step">Inspect the cover: a cracked or missing while-in-use cover lets water into the box. Replace before replacing the outlet.</div>
<div class="step">Corrosion inside the box means the outlet needs replacement regardless of function — corroded terminals have high resistance and generate heat.</div>
<div class="step">Replace with a WR (weather-resistant) GFCI rated for wet locations. Standard GFCI outlets are not rated for direct weathering.</div>
<div class="step">Silicone seal the back of the box where the conduit enters before installing the cover plate — most common water entry point missed during installation.</div>
</div>`},
                    {
                        title: "Aluminium wiring — safe connections and repairs", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Single-strand aluminium wiring (1965–73) is a documented fire hazard when connected to copper-only rated devices. Every connection point in the house needs to be addressed systematically.</p>
<div class="callout callout-warn"><div class="callout-label">Identify it first</div><p>Aluminium wiring is silver-coloured and marked AL or ALUM on the insulation. The hazard is in 15A and 20A branch circuits only — not service entrance cable where aluminium is still used appropriately today.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>Replace all devices (outlets, switches) with CO/ALR rated devices — the only devices rated for direct aluminium termination</li>
<li><i class="fa-solid fa-check ci-green"></i>Apply Noalox anti-oxidant compound to all aluminium wire ends before connecting — aluminium oxidises quickly and the oxide increases resistance</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Join aluminium to copper only with AlumiConn connectors or Copalum crimp connectors — not purple wire nuts which are no longer recommended by the CPSC</li>
<li><i class="fa-solid fa-xmark ci-red"></i>Never use standard wire nuts to join aluminium to copper — different expansion rates work the connection loose and generate heat</li>
</ul>
<div class="callout callout-info"><div class="callout-label">Full remediation</div><p>The only permanent fix is pigtailing every connection point with copper using AlumiConn connectors. Work systematically room by room with the panel map in hand.</p></div>`},
                    {
                        title: "Doorbell failures", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Doorbell systems run at 16–24VAC from a transformer and fail in predictable ways. The transformer, button, and chime unit each cost under $30 and replace individually.</p>
<div class="steps">
<div class="step">Press the button — no sound: briefly touch the chime's two wires together (low voltage — safe to touch). If the chime sounds, the button is dead — replace it ($8).</div>
<div class="step">Chime doesn't sound when wires touched: test voltage at chime terminals with a multimeter (AC setting). Should read 16–24V. No voltage = transformer failed.</div>
<div class="step">Transformer location: mounted on the panel side, a junction box near the main, or in the attic. 120V in, low voltage out.</div>
<div class="step">Replace transformer: turn off its breaker, confirm dead with tester, disconnect 120V wires, remove old transformer, install new matching VA rating (typically 10–40VA).</div>
<div class="step">Smart doorbells (Ring, Nest): require minimum 16V at 30VA. Many older homes have 10VA transformers — upgrade the transformer before blaming the doorbell unit.</div>
</div>`},
                    {
                        title: "Smoke and CO detector issues", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>A chirping smoke detector at 3am is almost always a low battery or end-of-life alarm — neither requires an electrician.</p>
<div class="callout callout-diag"><div class="callout-label">Chirp patterns</div><p>Single chirp every 30–60 seconds = low battery. Three beeps + pause = alarm (test for actual smoke/CO). Five beeps every minute = end of life, must be replaced. Continuous alarm in kitchen = responding to cooking — photoelectric type is better here.</p></div>
<div class="steps">
<div class="step">Chirping at night: pull unit from ceiling, disconnect, remove battery, hold TEST button 15 seconds to discharge capacitor — stops chirp immediately. Replace battery.</div>
<div class="step">Hardwired unit still chirps after battery replacement: the backup battery is separate from AC power. Replace the 9V or AA backup inside.</div>
<div class="step">Units older than 10 years: replace regardless — manufacture date is on the back. Replace with combination smoke/CO detector.</div>
<div class="step">Interconnected system false chirps: all units must be the same brand and generation to interconnect correctly. Mixing brands causes random alarms.</div>
</div>`},
                    {
                        title: "3-way and 4-way switch troubleshooting", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>A 3-way switch controls a light from two locations. When one position works and the other doesn't, the fault is almost always a miswired or failed switch — not the light fixture.</p>
<p>Logic: current enters the first switch's common terminal, travels via one of two traveller wires to the second switch, exits via that switch's common to the light. Swapping the travellers reverses which position is ON — useful for diagnosing without buying parts.</p>
<div class="steps">
<div class="step">Identify the common terminal by the darker (black or darker brass) screw — not by wire colour, which varies by installer.</div>
<div class="step">If both positions work in one location but not the other: the working switch is fine — pull the other switch first.</div>
<div class="step">Test suspect switch with continuity tester (power off): toggle while probing common to each traveller. One position = continuity on one traveller; other position = continuity on the other traveller. If a position shows no continuity on either = dead switch.</div>
<div class="step">Replacing: photograph before disconnecting. The common wire (dark screw) must go to the dark screw on the new switch — everything else follows from that.</div>
</div>`},
                    {
                        title: "AFCI nuisance tripping", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>Arc Fault Circuit Interrupters detect the electrical signature of arcing. Some appliances mimic that signature. The key is distinguishing a real fault from a false positive — never permanently disable an AFCI.</p>
<table class="dtable">
<thead><tr><th>What's tripping it</th><th>Why</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Vacuum cleaner</td><td>Motor brush arcing mimics wiring arcs</td><td>Plug into a non-AFCI circuit; or upgrade to brushless motor vacuum</td></tr>
<tr><td>Older treadmill or power tool</td><td>Same brush arcing issue</td><td>Dedicated non-AFCI circuit for that tool</td></tr>
<tr><td>Trips immediately on reset</td><td>Actual arc fault in wiring or a device</td><td>Disconnect all loads; add back one at a time; arcing devices feel warm at their plug</td></tr>
<tr><td>Trips randomly, no identifiable cause</td><td>Loose connection on the circuit generating intermittent arcing</td><td>Inspect all outlets and switches for loose terminals; check junction boxes</td></tr>
</tbody>
</table>
<div class="callout callout-warn"><div class="callout-label">Never permanently disable an AFCI</div><p>A real arc fault is a fire in progress. Find the cause — don't replace it with a standard breaker.</p></div>`},
                    {
                        title: "Understanding existing wiring by era", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Misidentifying the wiring type you're working with is one of the most dangerous mistakes in residential electrical work.</p>
<table class="dtable">
<thead><tr><th>Type</th><th>How to identify</th><th>Critical rules</th></tr></thead>
<tbody>
<tr><td>Knob and tube (pre-1940)</td><td>Single cloth-wrapped conductors on ceramic knobs; no ground wire</td><td>No ground — never connect grounded devices. Never cover with insulation — air-cooled by design. Do not add loads without electrician evaluation.</td></tr>
<tr><td>Aluminium branch circuit (1965–73)</td><td>Silver wire marked AL or ALUM on jacket</td><td>CO/ALR devices only. Anti-oxidant compound on all terminations. AlumiConn or Copalum for copper pigtails only.</td></tr>
<tr><td>Modern copper NM-B</td><td>NM-B on grey or white jacket; bare copper ground</td><td>Match wire gauge to breaker: 14AWG = 15A max, 12AWG = 20A max. Never exceed.</td></tr>
<tr><td>Conduit (THHN/THWN)</td><td>Individual insulated conductors in metal or plastic conduit</td><td>Any colour can be hot if re-identified at terminations. Verify with a tester, never assume by colour.</td></tr>
</tbody>
</table>`}
                ]

                    {
                        title: "Furnace anatomy and the heating cycle", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "30 min",
                        body: `<p>You can't diagnose what you don't understand. Every furnace failure is one step in this sequence that didn't complete — knowing the sequence tells you exactly where to look.</p>
<table class="dtable">
<thead><tr><th>Sequence step</th><th>Component</th><th>What you hear / see if it fails</th></tr></thead>
<tbody>
<tr><td>1. Call for heat</td><td>Thermostat</td><td>Thermostat signals, nothing happens = power or thermostat fault</td></tr>
<tr><td>2. Inducer motor starts</td><td>Draft inducer</td><td>Whirring before burner. No sound = inducer or pressure switch fault</td></tr>
<tr><td>3. Pressure switch verifies draft</td><td>Pressure switch</td><td>Inducer runs but igniter never glows = pressure switch or blocked flue</td></tr>
<tr><td>4. Igniter heats up</td><td>Hot surface igniter</td><td>Should glow orange-red. Not glowing = igniter failed (most common fault)</td></tr>
<tr><td>5. Gas valve opens</td><td>Gas valve</td><td>Click + whoosh. No click = control board or gas valve fault</td></tr>
<tr><td>6. Flame sensor confirms flame</td><td>Flame sensor</td><td>Lights then shuts off in 2–5 sec = dirty or failed flame sensor</td></tr>
<tr><td>7. Blower starts after delay</td><td>Blower motor</td><td>~60 sec after flame. No airflow = blower capacitor or motor fault</td></tr>
</tbody>
</table>
<div class="callout callout-info"><div class="callout-label">Error codes</div><p>Modern furnaces flash an LED error code on the control board. Count the flashes and look up the code on the sticker inside the furnace door — it pinpoints exactly which step failed without guesswork.</p></div>`

                    {
                        title: "Thermostat diagnosis and replacement", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>The thermostat is the easiest component to test and the one most people replace unnecessarily. Test it in 30 seconds before buying anything.</p>
<div class="callout callout-diag"><div class="callout-label">Bypass test</div><p>At the furnace control board, briefly touch the W wire terminal to R. Furnace starts = thermostat or wiring fault. Nothing happens = furnace fault. This one test tells you which half of the system to focus on.</p></div>
<div class="steps">
<div class="step">Batteries first — a thermostat with weak batteries reads temperature incorrectly or stops communicating. Always.</div>
<div class="step">Check the wiring terminals at the thermostat: R (24V power), C (common), W (heat), Y (cool), G (fan). A loose wire here causes the same symptom as a failed thermostat.</div>
<div class="step">Smart thermostat: most require a C wire for continuous power. Many older systems only have R, W, Y, G at the wall. Options: run a new C wire from the furnace board, repurpose the G wire with a fan-only kit, or use a model with a built-in power adapter (Ecobee, some Nest models).</div>
<div class="step">Replacement: photograph the wiring before removing anything. Label each wire with tape. Connect matching letters on the new thermostat. Test heating and cooling modes before putting the cover on.</div>
</div>
<div class="callout callout-warn"><div class="callout-label">Heat pump systems</div><p>Heat pumps use an O or B terminal for the reversing valve. Installing a standard furnace thermostat on a heat pump will damage the reversing valve. Always identify the system type — heat pump or gas/electric — before purchasing a replacement.</p></div>`
                    },
                    {
                        title: "Furnace won't start — systematic diagnosis", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Work this sequence in order. Don't skip to replacing parts before you've confirmed which step in the startup sequence failed.</p>
<div class="steps">
<div class="step"><strong>Power:</strong> check the breaker. Also check the furnace power switch — it looks exactly like a light switch on the wall near the unit and gets flipped off accidentally more often than you'd think.</div>
<div class="step"><strong>Filter:</strong> a completely clogged filter trips the high-limit switch, which cuts the igniter circuit. Pull and inspect before anything else — 20 seconds.</div>
<div class="step"><strong>Gas supply:</strong> is the gas shutoff valve on the furnace open (handle parallel to the pipe = open)? Is other gas equipment in the house working?</div>
<div class="step"><strong>Thermostat:</strong> set to HEAT, fan to AUTO, temp 5° above room temp. Do the W-to-R bypass test at the board to confirm whether the thermostat is sending the call.</div>
<div class="step"><strong>Read the error code:</strong> the LED on the control board flashes a code sequence. Count the blinks, look it up on the sticker inside the door. This tells you exactly which step failed and saves 30 minutes of guesswork.</div>
<div class="step"><strong>Inducer motor:</strong> do you hear it start (whirring sound)? If not — failed motor, seized bearing, or pressure switch preventing startup. Check for a blocked flue exhaust pipe first.</div>
<div class="step"><strong>Igniter:</strong> if the inducer runs but burner never lights, watch through the sight glass. Igniter should glow bright orange-red. No glow = failed igniter, which is the single most common furnace fault.</div>
</div>`
                    },
                    {
                        title: "Hot surface igniter and flame sensor", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>These two components cause the majority of furnace no-heat calls. Both are $15–50 parts and straightforward to replace or service.</p>
<div class="callout callout-diag"><div class="callout-label">Tell them apart by symptom</div><p>Igniter failed: furnace attempts to start, inducer runs, but the burner never ignites. No glow visible through the sight glass. Flame sensor dirty or failed: burner DOES light, runs 2–5 seconds, then shuts off and re-tries 2–3 times before locking out with an error code.</p></div>
<div class="steps">
<div class="step"><strong>Testing the igniter:</strong> power off, unplug the igniter. Set multimeter to resistance (Ω). Silicon nitride igniters: 40–90Ω. Silicon carbide: 40–70Ω. Open circuit (OL) = failed igniter. Replace.</div>
<div class="step"><strong>Igniter replacement:</strong> these are fragile ceramic elements — never touch with bare hands. Skin oil creates a hot spot that cracks the element. Use a rag or gloves. Remove the single mounting screw, swap in the new one. Match the OEM part number from the furnace label.</div>
<div class="step"><strong>Cleaning the flame sensor — 30-second fix:</strong> power off. Remove the single screw holding the flame sensor rod. Lightly buff the metal rod with fine steel wool or 400-grit emery cloth until it's bright metal. Reinstall. This resolves 80% of "lights and goes out" calls without any parts at all.</div>
<div class="step"><strong>Testing flame sensor output:</strong> set multimeter to DC microamps (µA). Place probes in series with the sensor wire while the burner is lit. Should read 1–10 µA. Under 0.5 µA = clean or replace the sensor.</div>
</div>
<div class="callout callout-info"><div class="callout-label">First move on any "lights and goes out" call</div><p>If a furnace sat unused all summer, clean the flame sensor before ordering any parts. It costs nothing and resolves the fault more often than not.</p></div>`
                    },
                    {
                        title: "Furnace short cycling", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Short cycling — starts, runs briefly, shuts off, restarts in minutes — is almost always an overheating problem. The furnace is protecting itself. Find why it's overheating before replacing parts.</p>
<table class="dtable">
<thead><tr><th>Cause</th><th>Diagnosis</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Clogged filter</td><td>Restricted airflow, filter visibly dirty</td><td>Replace filter — check this before anything else</td></tr>
<tr><td>Blocked registers</td><td>Closed or furniture-blocked supply/return vents</td><td>Open all registers; maintain 6" clearance around returns</td></tr>
<tr><td>Failing high-limit switch</td><td>Trips at normal temperature</td><td>Temporarily bypass to test; if furnace runs normally, replace the switch</td></tr>
<tr><td>Cracked heat exchanger</td><td>CO alarm, flames waver when blower starts, soot around cracks</td><td>Shut down immediately — call HVAC tech; this is a CO risk</td></tr>
<tr><td>Oversized furnace</td><td>Has always short-cycled since installation</td><td>Manual J load calculation; may require unit downsizing</td></tr>
</tbody>
</table>
<div class="callout callout-warn"><div class="callout-label">Heat exchanger — stop and refer</div><p>If burner flames visibly waver or roll when the blower kicks on, or a CO detector alarms during furnace operation, shut the furnace off and do not restart it. Combustion gases in the living space is a life-safety issue. This is not a handyman repair.</p></div>`
                    },
                    {
                        title: "Air conditioning not cooling — diagnosis", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "35 min",
                        body: `<p>AC diagnosis follows the same supply-chain logic as any other system — start cheap and accessible, work toward expensive and technical.</p>
<div class="callout callout-diag"><div class="callout-label">Triage by symptom</div><p>Runs but barely cools: dirty condenser coils or low refrigerant. Short cycles: frozen coil or low refrigerant. Won't start at all: capacitor or contactor fault. Runs but no airflow: blower issue. Ice on the line set: frozen evaporator coil (see Lesson 8).</p></div>
<div class="steps">
<div class="step"><strong>Filter:</strong> a dirty filter causes 30–40% of AC service calls. Always the first check.</div>
<div class="step"><strong>Outdoor condenser coils:</strong> stand beside the outdoor unit — can you see daylight through the fins? If coils are packed with cottonwood seed, grass clippings, or debris, the unit cannot reject heat. Shut power off at the disconnect. Rinse from the inside out with a garden hose at low pressure. Never pressure-wash — bent fins are permanent damage.</div>
<div class="step"><strong>Refrigerant signs:</strong> runs constantly but house barely cools; the large insulated suction line is not cold to the touch; ice builds on the line or coil. These point to low refrigerant. This requires an EPA 608-certified tech — it is illegal to handle refrigerants without certification.</div>
<div class="step"><strong>Capacitor:</strong> outdoor unit hums but fan or compressor won't start = capacitor failure. See Lesson 7. This is within handyman scope and one of the highest-value HVAC repairs you can do.</div>
<div class="step"><strong>Contactor:</strong> the magnetic switch that connects 240V to the compressor and condenser fan. Pitted or burned contacts cause intermittent operation. Inspect visually with power off — clear burn marks or fused contacts. A $15 part, straightforward to swap.</div>
</div>`
                    },
                    {
                        title: "Capacitor failure — the most common AC and furnace electrical fault", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>Capacitors start and run electric motors. Every AC unit has at least one. When they fail, the motor hums but won't spin. An HVAC tech charges $200–400 for a $15–30 part and a 15-minute swap.</p>
<div class="callout callout-warn"><div class="callout-label">Discharge before touching</div><p>A capacitor holds a lethal charge even with power off. Turn off power at the disconnect, wait 5 minutes, then short across the terminals with an insulated screwdriver before handling. No exceptions.</p></div>
<div class="steps">
<div class="step"><strong>Visual check:</strong> a bulged top or oil seeping from the bottom = failed. Replace without further testing. A normal-looking capacitor can still be dead — always test.</div>
<div class="step"><strong>Testing:</strong> after discharging, set multimeter to capacitance (µF). Test across each terminal pair. Compare to the label. Within 10% of rated value is acceptable. More than 10% low = replace.</div>
<div class="step"><strong>Dual-run capacitors:</strong> one can with three terminals — COMMON, HERM (compressor), FAN. Test HERM-to-COMMON and FAN-to-COMMON separately. One leg commonly fails while the other reads fine.</div>
<div class="step"><strong>Replacement:</strong> photograph wiring before disconnecting. Match µF rating exactly for each leg. Voltage rating at or above the original is safe — below is not. Reconnect: C (common) to common leg, HERM to compressor, FAN to fan motor.</div>
<div class="step"><strong>After replacing:</strong> restore power and watch startup. A compressor that tries and immediately trips off has a deeper fault (seized or shorted) — stop attempting restarts or you'll burn the windings.</div>
</div>`
                    },
                    {
                        title: "Frozen evaporator coil", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>A frozen coil stops your AC cold and can flood the condensate pan as it thaws. The cause is almost always restricted airflow — not refrigerant — and the fix starts with the filter.</p>
<div class="callout callout-diag"><div class="callout-label">Signs of a frozen coil</div><p>AC runs continuously but produces little cooling. Ice visible on the large insulated suction line leaving the air handler. In severe cases, the air handler cabinet is iced over. Condensate pan overflowing.</p></div>
<div class="steps">
<div class="step"><strong>Thaw it:</strong> turn AC to OFF and fan to ON (fan-only mode). Room-temperature air thaws the coil in 1–4 hours. Do not chip the ice — coil fins are thin aluminium and destroy instantly.</div>
<div class="step"><strong>Protect the area:</strong> lay towels around the air handler base. The condensate pan can overflow as ice melts. If a float switch (wet switch) shuts the unit off mid-thaw, that's correct behaviour — it prevented a flood.</div>
<div class="step"><strong>Find the cause:</strong> replace the filter. Confirm all registers are open. After restarting, measure the temperature drop across the coil — should be 14–22°F (stick a thermometer in a return register and a supply register). Under 14°F with a clean filter = low refrigerant.</div>
<div class="step"><strong>If it freezes again:</strong> refrigerant issue or failing blower motor. A system that repeatedly freezes after a filter change needs a certified tech for refrigerant diagnosis.</div>
</div>
<div class="callout callout-info"><div class="callout-label">Prevention</div><p>Filter every 60 days. Never close more than 20% of supply registers — closing rooms to "redirect" airflow raises static pressure, drops coil surface temperature below freezing, and causes the exact problem you were trying to avoid.</p></div>`
                    },
                    {
                        title: "Condensate drain blockage", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Central AC and high-efficiency furnaces produce several gallons of condensate per day. A blocked drain causes water damage, mould, and nuisance shutdowns from the float safety switch.</p>
<div class="callout callout-diag"><div class="callout-label">Symptom map</div><p>AC shuts off without apparent cause = float switch tripped by standing water in the drain pan. Water pooling around the air handler = primary drain backed up. Water dripping from a secondary line over a window or through the soffit = primary has been blocked long enough to fill the overflow pan.</p></div>
<div class="steps">
<div class="step"><strong>Clear the primary drain:</strong> locate the capped PVC T-fitting near the air handler — the access point for the drain line. Pour 1 cup of white vinegar, wait 30 minutes. For a full blockage, seal a wet/dry vac hose around the outdoor drain terminus and vacuum the blockage out from that end.</div>
<div class="step"><strong>Float switch reset:</strong> once the pan is empty and drain flows freely, the float switch resets automatically. Don't replace the switch for doing its job — find and fix the drain.</div>
<div class="step"><strong>Trace the drain:</strong> follows gravity from the air handler to a floor drain, utility sink, or through an exterior wall. Common drain outlet locations: near the outdoor unit, through the foundation, into the utility sink.</div>
<div class="step"><strong>Maintenance:</strong> monthly during the cooling season — pour 1/4 cup of distilled white vinegar or diluted bleach into the drain access. Prevents algae growth that causes 80% of blockages.</div>
</div>
<div class="callout callout-info"><div class="callout-label">High-efficiency furnaces</div><p>90%+ efficient furnaces produce condensate in winter — sometimes 3–4 gallons per day. Their drain lines run through attics or crawlspaces where they can freeze. A high-efficiency furnace that shuts off in cold weather: check whether the condensate line is frozen solid before anything else.</p></div>`
                    },
                    {
                        title: "Filter selection and airflow problems", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>The wrong filter is one of the most overlooked causes of HVAC failures. More filtration is not always better — it comes at the cost of airflow.</p>
<table class="dtable">
<thead><tr><th>MERV rating</th><th>Filter type</th><th>Appropriate for</th></tr></thead>
<tbody>
<tr><td>1–4</td><td>Fibreglass flat panel</td><td>Basic equipment protection only. Rarely appropriate in a residential system.</td></tr>
<tr><td>8–10</td><td>Pleated 1" polyester</td><td>Standard residential. Best balance of filtration and airflow. Most systems are designed around this range.</td></tr>
<tr><td>11–13</td><td>High-efficiency pleated</td><td>Good for air quality — may restrict airflow in standard residential systems. Verify system specs.</td></tr>
<tr><td>14–16</td><td>HEPA-equivalent</td><td>Only in systems engineered for high static pressure. Will restrict airflow and damage standard residential equipment.</td></tr>
</tbody>
</table>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>1" filters: change every 30–60 days. 4" media filters: every 6–12 months. This single maintenance item prevents more HVAC failures than everything else combined</li>
<li><i class="fa-solid fa-check ci-green"></i>Arrow on the filter frame points toward the air handler — toward the blower, not toward the return grille</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Never close more than 20% of supply registers — closing rooms raises static pressure across the whole system and causes coil freezing or heat exchanger overheating</li>
<li><i class="fa-solid fa-xmark ci-red"></i>A MERV 13 filter in a system designed for MERV 8 restricts airflow 20–30% — equivalent to running with a partially clogged filter, every day, from the moment it's installed</li>
</ul>`
                    },
                    {
                        title: "Ductwork leaks — finding and sealing", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>Leaky ducts waste 20–30% of HVAC capacity — heating or cooling the attic, crawlspace, or wall cavities instead of the living space. Return-side leaks also pull in unconditioned, unfiltered air.</p>
<div class="callout callout-diag"><div class="callout-label">Find leaks without equipment</div><p>Run the system and hold a lit incense stick near all duct joints, take-off collars, and connections. Smoke pulled inward = return-side leak. Smoke blown away = supply-side leak. Rooms that are always uncomfortable despite open registers often have a leak on their branch run.</p></div>
<div class="steps">
<div class="step"><strong>Fix return-side leaks first:</strong> return ducts are under negative pressure and pull in attic or crawlspace air — unconditioned, often mouldy, and completely unfiltered. These cause air quality problems as well as efficiency losses.</div>
<div class="step"><strong>Sealing material:</strong> use fibreglass-reinforced duct mastic (paste). Apply with a gloved hand or paintbrush. For gaps over 1/4", apply fibreglass mesh first, then mastic over it. Mastic stays flexible permanently and never peels — unlike any tape.</div>
<div class="step"><strong>Not grey duct tape:</strong> cloth duct tape fails in 2–3 years in attic temperatures. Use UL 181-rated aluminium foil tape (3M 3340 or equivalent) if mastic isn't available. Grey duct tape on ductwork is always wrong.</div>
<div class="step"><strong>Flex duct:</strong> check for disconnected boot collars (pops off during installation and hides inside the insulation jacket). Check for kinks — a 90° kink reduces airflow by over 50%. Reconnect boots with zip ties and seal seams with foil tape. Support every 4 feet to prevent sag that creates permanent kinks.</div>
<div class="step"><strong>Priority leak points:</strong> plenum connections at the air handler, trunk-to-branch take-off collars, and boot-to-subfloor connections at registers. These are the highest-volume leak points on most systems.</div>
</div>`
                    },
                    {
                        title: "Heat pump basics and troubleshooting", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>A heat pump is an air conditioner that can reverse to provide heat. Understanding that distinction informs every diagnostic decision — a heat pump problem has different causes and different fixes than a furnace.</p>
<div class="callout callout-info"><div class="callout-label">How it differs from a furnace</div><p>A heat pump moves heat — it doesn't create it. In heating mode, it extracts heat energy from outdoor air (even at 30°F there is usable heat) and moves it inside. Below about 35–40°F, efficiency drops and auxiliary electric strip heaters supplement. This is normal and by design.</p></div>
<table class="dtable">
<thead><tr><th>Symptom</th><th>Likely cause</th><th>Action</th></tr></thead>
<tbody>
<tr><td>Blows cold in heat mode</td><td>Reversing valve stuck in cooling position</td><td>HVAC tech — reversing valve replacement</td></tr>
<tr><td>Outdoor unit solid block of ice, won't clear</td><td>Defrost board or sensor failure</td><td>HVAC tech — surface frost is normal, ice block is not</td></tr>
<tr><td>Aux heat running constantly</td><td>Heat pump not contributing — outdoor unit fault or low refrigerant</td><td>Confirm outdoor unit is running. If not: capacitor/contactor (Lessons 7 and 6). If running: refrigerant — refer.</td></tr>
<tr><td>Steam from outdoor unit in winter</td><td>Normal defrost cycle</td><td>Nothing — the heat pump is defrosting correctly. This surprises homeowners but is expected.</td></tr>
<tr><td>Outdoor unit won't start</td><td>Capacitor, contactor, or refrigerant</td><td>Test capacitor first (Lesson 7). Check contactor contacts. Then refer to tech.</td></tr>
</tbody>
</table>
<div class="callout callout-warn"><div class="callout-label">Emergency heat</div><p>Emergency heat bypasses the heat pump and runs only the electric strips — 3–4× more expensive per BTU. Use only when the heat pump has a confirmed mechanical failure. It should not be used just because it's very cold outside.</p></div>`
                    },
                    {
                        title: "Blower motor and fan issues", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>The blower moves conditioned air through the house and draws return air back to the system. A blower fault affects both heating and cooling — the system runs but nothing moves.</p>
<div class="callout callout-diag"><div class="callout-label">Symptom map</div><p>System fires (burner on or compressor humming) but no airflow at registers = blower not running. Airflow gradually reduced over months = dirty blower wheel. Loud grinding or squealing from inside the air handler = bearing failure. Airflow weak in certain zones only = duct issue, not blower.</p></div>
<div class="steps">
<div class="step"><strong>Capacitor first:</strong> the blower motor capacitor is the most common cause of "system runs but no airflow." Test as per Lesson 7. A $15 repair that resolves the majority of blower calls.</div>
<div class="step"><strong>Blower wheel cleaning:</strong> if airflow has slowly decreased over years, the wheel is likely coated with debris on every fin. Shut power off, remove the blower assembly (usually 4 screws and a plug connector). Clean each fin with a stiff brush and compressed air. A loaded blower wheel reduces airflow 40–50%.</div>
<div class="step"><strong>PSC motors (older systems):</strong> multi-speed, controlled by which winding terminal is connected at the control board. Blower runs on one speed but not another = that winding has failed. Replace the motor.</div>
<div class="step"><strong>ECM motors (variable speed, newer systems):</strong> electronically controlled, very efficient. Before replacing, confirm a 24V control signal from the board to the motor module. If signal is present but motor won't run, the module has failed. ECM replacement is $300–600 — confirm diagnosis before ordering.</div>
<div class="step"><strong>Bearing noise:</strong> grinding or squealing from the blower. Most residential blowers are direct-drive with sealed bearings — the motor is replaced, not lubricated. Belt-drive systems (older commercial/residential) can have the belt and bearings serviced separately.</div>
</div>`
                    },
                    {
                        title: "When to call an HVAC technician", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "20 min",
                        body: `<p>Knowing your scope on HVAC is as important as knowing the repairs. The boundary between handyman and HVAC work is defined by law, safety, and physical access to the refrigerant circuit.</p>
<div class="callout callout-diag"><div class="callout-label">Handyman scope on HVAC</div><p>Thermostat replacement, filter changes, capacitor replacement, condensate drain clearing, flame sensor cleaning, hot surface igniter replacement, outdoor coil rinsing, duct sealing, basic startup sequence diagnosis, and referral reporting. These resolve 50–60% of HVAC service calls.</p></div>
<div class="callout callout-warn"><div class="callout-label">Refer to a licensed HVAC tech when</div><p>Refrigerant handling is required — purchasing or handling refrigerant without an EPA 608 certification is a federal violation. Cracked heat exchanger is suspected. Gas valve replacement is needed. Any work on combustion appliance flue or venting. Compressor replacement. Electrical work on the main panel or service feeding the HVAC disconnect.</p></div>
<ul class="checklist">
<li><i class="fa-solid fa-check ci-green"></i>A precise diagnostic report — which step in the startup sequence failed, what you tested, what you ruled out — shortens the tech's job and positions you as the competent first responder</li>
<li><i class="fa-solid fa-check ci-green"></i>Build a referral relationship with one HVAC contractor: you send them refrigerant and heat exchanger work, they send you thermostat replacements and maintenance calls. One of the most productive referral trades in the business.</li>
<li><i class="fa-solid fa-triangle-exclamation ci-amber"></i>Confirm a working CO detector in every home with a gas furnace or boiler — before and after any furnace work. Carbon monoxide has no smell, and a cracked heat exchanger is a real possibility on any older unit</li>
</ul>`
                    }
                ]
            },
            {
                id: "carpentry", label: "Carpentry", eyebrow: "Module 3 of 7", title: "Carpentry — 14 common problems",
                intro: "Sticky doors to squeaky stairs, rot assessment to load-bearing walls, cabinet alignment to deck boards — 14 of the most common carpentry issues with diagnosis and permanent fixes from 30 years on the job.",
                lessons: [
                    {
                        title: "Sticky and misaligned doors", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>A door that sticks or swings open on its own isn't a door problem — it's a frame problem. Plane the door only after understanding why it's binding.</p>
<div class="callout callout-diag"><div class="callout-label">Read the gap first</div><p>Binds at top-latch, drags at bottom-hinge = hinge side sagging. Binds at top-hinge, drags at bottom-latch = house has racked (soil movement or header deflection). Uniform binding on one side = stop bead shifted or frame swelled from moisture.</p></div>
<div class="steps">
<div class="step">Tighten all hinge screws first. Replace the middle screw in the top hinge with a 3" structural screw driving into the stud — fixes 40% of hinge-side sag.</div>
<div class="step">Stripped hinge screw holes: fill with wood glue and toothpicks, cure 24 hours, re-drive.</div>
<div class="step">Stop bead shifted: pry off, close the door, mark correct position, renail flush to the door face.</div>
<div class="step">Planing: mark the binding area with chalk on the frame edge. Remove the door. Plane only the marked area — a belt sander with 80-grit is faster than a hand plane on painted doors.</div>
<div class="step">Seasonal swell (only in summer): don't plane in winter — you'll create a gap. Seal all bare wood edges with primer and paint to reduce moisture absorption.</div>
</div>`},
                    {
                        title: "Squeaky floors — from above and below", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "30 min",
                        body: `<p>A squeak is two surfaces rubbing. The challenge is locating exactly which two. Subfloor on joist, hardwood boards on each other, and joist on hanger all produce squeaks but need different fixes.</p>
<div class="steps">
<div class="step">From below: have someone walk the floor while you watch from below. You can often see slight movement. Inject construction adhesive between subfloor and joist, then draw them together with a screw driven up through the joist — don't penetrate the finish floor.</div>
<div class="step">Subfloor seam: drive 2" screws through the subfloor into the joist on both sides of the seam, every 6".</div>
<div class="step">From above with carpet or hardwood: use Squeeeeek-No-More breakaway screws — the head snaps off below the finished floor surface.</div>
<div class="step">Hardwood boards rubbing: force powdered graphite or talcum into the joint between squeaky boards. Work in with a stiff brush and flex the floor to distribute. Often eliminates the squeak without structural work.</div>
<div class="step">Stairs: almost always the tread rubbing the riser. From below: apply construction adhesive at the tread-riser joint. From above: drive finish screws through the tread into the riser at an angle and fill holes.</div>
</div>`},
                    {
                        title: "Squeaky stairs", badges: [{ t: "Diagnostics", c: "badge-diag" }], dur: "25 min",
                        body: `<p>Stair squeaks are almost always the tread moving against the riser or the tread on the stringer. Thirty seconds of rocking your weight shows you exactly where the movement is.</p>
<div class="steps">
<div class="step">Identify precisely: tread front edge squeak = tread against riser. Back edge squeak = tread on stringer. The movement location tells you where to fasten.</div>
<div class="step">Open staircase from below: construction adhesive into the tread-riser joint + small screws through the riser into the underside of the tread. Most permanent fix.</div>
<div class="step">Closed staircase from above: pilot holes at steep angle through tread into riser, drive 2.5" finish screws, countersink, fill with wood filler.</div>
<div class="step">Tread-stringer squeak: inject wood glue into the joint, weight overnight. If the joint is open, shim with a thin wood wedge dipped in glue.</div>
<div class="step">Utility stair — all squeaks: install L-brackets underneath at every tread-riser joint. Not pretty, but eliminates all movement permanently.</div>
</div>`},
                    {
                        title: "Bouncy floors — joists and subfloor", badges: [{ t: "Advanced", c: "badge-adv" }], dur: "35 min",
                        body: `<p>A bouncy floor is a structural deficiency. It's not usually dangerous immediately, but it gets worse and makes tile or hardwood crack and loosen.</p>
<table class="dtable">
<thead><tr><th>Symptom</th><th>Cause</th><th>Fix</th></tr></thead>
<tbody>
<tr><td>Whole bay bouncy, bridging missing</td><td>Joists undersized for span or no blocking</td><td>Add solid blocking at midspan; or add a mid-span beam with a post to the foundation</td></tr>
<tr><td>Single joist noticeably deflecting</td><td>Improperly notched, drilled, or damaged joist</td><td>Sister a full-length joist alongside with adhesive and screws every 12"</td></tr>
<tr><td>Bouncy near a wall</td><td>Joist hanger failure or inadequate bearing on sill plate</td><td>Install or replace joist hanger; ensure 1.5" bearing on sill plate</td></tr>
<tr><td>Bounces near a partition wall above</td><td>Doubled joist under wall is split or missing</td><td>Sister a full-length joist on each side of the existing one</td></tr>
</tbody>
</table>
